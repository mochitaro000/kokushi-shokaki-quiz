<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>カテゴリーⅠ 消化器 予想問題</title>
<style>
  :root{
    --accent:#185FA5; --accent-bg:#E6F1FB; --accent-line:#378ADD;
    --ok:#0F6E56; --ok-bg:#E1F5EE;
    --page:#F1EFE8; --card:#FFFFFF; --ink:#23231f; --sub:#5F5E5A; --muted:#888780;
    --line:#D3D1C7; --line2:#B4B2A9;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --accent:#85B7EB; --accent-bg:#0C447C; --accent-line:#378ADD;
      --ok:#5DCAA5; --ok-bg:#085041;
      --page:#1a1a18; --card:#26261f; --ink:#ECEAE2; --sub:#B4B2A9; --muted:#888780;
      --line:#3a3a34; --line2:#55554c;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--page); color:var(--ink); line-height:1.7;
    display:flex; justify-content:center; min-height:100vh;
  }
  #app{width:100%; max-width:480px; background:var(--card); min-height:100vh; display:flex; flex-direction:column}
  header{padding:12px 16px; border-bottom:.5px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px}
  header .t{font-size:13px; color:var(--sub)}
  header .count{font-size:13px; color:var(--sub); white-space:nowrap}
  .bar{height:5px; background:var(--page); overflow:hidden}
  .bar>div{height:100%; background:var(--accent); width:0; transition:width .25s}
  main{flex:1; padding:16px; overflow-y:auto}
  footer{padding:12px 16px 20px; border-top:.5px solid var(--line)}
  .btn{display:block; width:100%; text-align:center; font-size:15px; font-weight:500;
    padding:14px; border-radius:12px; border:none; cursor:pointer; background:var(--accent); color:#fff}
  .btn:disabled{opacity:.4; cursor:default}
  .btn.ghost{background:transparent; border:.5px solid var(--line2); color:var(--sub); font-weight:400}
  .row{display:flex; gap:8px}
  .hero{text-align:center; padding:24px 8px 8px}
  .hero h1{font-size:22px; font-weight:600; margin:0 0 6px}
  .hero p{font-size:14px; color:var(--sub); margin:0}
  .panel{background:var(--page); border-radius:12px; padding:16px; margin:16px 0}
  .panel h2{font-size:13px; color:var(--sub); font-weight:500; margin:0 0 10px}
  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{flex:1; min-width:64px; padding:10px; border-radius:10px; border:.5px solid var(--line2);
    background:var(--card); color:var(--ink); font-size:14px; cursor:pointer}
  .seg button.on{border:2px solid var(--accent); background:var(--accent-bg); color:var(--accent); font-weight:500}
  .stat{display:flex; gap:8px; margin:16px 0}
  .stat .c{flex:1; background:var(--page); border-radius:12px; padding:12px; text-align:center}
  .stat .c .n{font-size:22px; font-weight:600}
  .stat .c .l{font-size:11px; color:var(--muted)}
  .tags{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
  .tag{font-size:11px; padding:3px 10px; border-radius:99px; background:var(--accent-bg); color:var(--accent)}
  .tag.k{background:var(--page); color:var(--sub)}
  .case{background:var(--page); border-radius:12px; padding:12px 14px; font-size:13px; margin-bottom:12px; white-space:pre-wrap}
  .q{font-size:15px; font-weight:500; margin:0 0 4px}
  .hint{font-size:12px; color:var(--muted); margin:0 0 14px}
  .opt{display:flex; align-items:flex-start; gap:10px; border:.5px solid var(--line2); border-radius:12px;
    padding:11px 13px; margin-bottom:9px; font-size:14px; cursor:pointer; background:var(--card)}
  .opt .k{flex:0 0 24px; height:24px; border-radius:50%; background:var(--page); display:flex;
    align-items:center; justify-content:center; font-size:13px; font-weight:500; margin-top:1px}
  .opt.sel{border:2px solid var(--accent); background:var(--accent-bg); color:var(--accent)}
  .opt.sel .k{background:var(--accent); color:#fff}
  .opt.correct{border:2px solid var(--ok); background:var(--ok-bg); color:var(--ok); cursor:default}
  .opt.correct .k{background:var(--ok); color:#fff}
  .opt.wrong{border:.5px solid var(--line); color:var(--muted); text-decoration:line-through; cursor:default}
  .opt.wrong .k{background:var(--page)}
  .opt.plain{cursor:default; opacity:.7}
  .badge{margin-left:auto; font-size:11px; font-weight:500; padding:2px 8px; border-radius:99px; white-space:nowrap; text-decoration:none}
  .badge.b-ok{background:var(--ok); color:#fff}
  .badge.b-miss{background:var(--line2); color:var(--card)}
  .result-head{display:flex; align-items:center; gap:8px; font-size:16px; font-weight:600; margin:4px 0 12px}
  .result-head.hit{color:var(--ok)}
  .result-head.miss{color:var(--accent)}
  .mark{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff}
  .expl{background:var(--page); border-radius:12px; padding:13px 14px; font-size:13px}
  .expl .lab{font-size:12px; font-weight:500; color:var(--sub); margin-bottom:5px}
  .score{text-align:center; padding:20px 8px}
  .score .big{font-size:44px; font-weight:600; color:var(--accent)}
  .score .lab{font-size:14px; color:var(--sub)}
  .review-item{border:.5px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px}
  .review-item .h{display:flex; gap:8px; align-items:center; font-size:13px; margin-bottom:4px}
  .dot{width:16px;height:16px;border-radius:50%;flex:0 0 16px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="t" id="hTitle">カテゴリーⅠ 消化器</div>
    <div class="count" id="hCount"></div>
  </header>
  <div class="bar"><div id="prog"></div></div>
  <main id="main"></main>
  <footer id="footer"></footer>
</div>

<script>
const QUESTIONS = [
{
  id:1, cat:"肝炎ウイルス", type:"multiple", ref:"cf. 111I31",
  q:"慢性化しやすい（持続感染に移行しうる）肝炎ウイルスはどれか。2つ選べ。",
  choices:[["a","A型"],["b","B型"],["c","C型"],["d","D型"],["e","E型"]],
  answer:["b","c"],
  expl:"HBVは乳児期感染でキャリア化、成人感染でもgenotype Aで約10%が慢性化。HCVは約70%と高率に慢性化する。A型・E型は基本的に一過性で慢性化しない（E型は移植後など免疫抑制状態でのみ例外的に慢性化）。D型はHBVと共存して初めて成立する。"
},
{
  id:2, cat:"E型肝炎", type:"single", ref:"cf. 112B34",
  case:"35歳の男性。黄疸を主訴に来院。1週間前から全身倦怠感があり、2日前に眼の黄染を指摘された。1か月前にシカ肉を焼いて食べたが一部生焼けであった。海外渡航歴なし。\n血液所見：AST 406 U/L、ALT 498 U/L、総ビリルビン 4.5 mg/dL、PT-INR 1.0。HBs抗原陰性、HCV抗体陰性。",
  q:"対応として正しいのはどれか。",
  choices:[["a","安静を指示する"],["b","血漿交換を行う"],["c","シクロスポリンを投与する"],["d","インターフェロンを投与する"],["e","内視鏡的胆道ドレナージを行う"]],
  answer:["a"],
  expl:"人獣共通感染症であるE型肝炎（イノシシ・シカ・ブタの生肉が感染源）。急性肝炎はA型に類似し、PT-INRも保たれ劇症化していない。治療は保存的（安静）が基本。抗ウイルス薬や血漿交換は不要。"
},
{
  id:3, cat:"針刺し事故", type:"single", ref:"cf. 119F40",
  case:"26歳の女性。臨床研修1年目。HBs抗原陽性患者の手術中に針刺し事故を起こした。ただちに流水で洗浄。B型肝炎の罹患歴はなく、4年前にHBワクチンを接種し、入職時のHBs抗体価は十分に高かった。",
  q:"適切な対応はどれか。",
  choices:[["a","経過観察"],["b","HBワクチン接種"],["c","核酸アナログ製剤投与"],["d","抗HBsヒト免疫グロブリン投与"],["e","HBワクチン接種および抗HBsヒト免疫グロブリン投与"]],
  answer:["a"],
  expl:"HBワクチン接種歴があり抗体価が十分に高い（=獲得免疫がある）者は、HBs抗原陽性患者からの曝露でも追加の予防処置は不要で経過観察でよい。抗体が不十分または未獲得の場合に、48時間以内のHBIG＋ワクチンを行う。"
},
{
  id:4, cat:"HBV再活性化", type:"single", ref:"cf. 116D49",
  case:"77歳の女性。意識障害で搬入。1年前まで非ホジキンリンパ腫の治療を受け「治癒した」と言われていた。治療前のB型肝炎マーカーはHBs抗原陰性・HBs抗体陽性・HBc抗体陽性であった。\n現在：AST 3,956 U/L、ALT 2,824 U/L、総ビリルビン 3.2 mg/dL、PT-INR 2.1、アンモニア 186 μg/dL。HBs抗原陽性、HBV-DNA陽性。",
  q:"考えられる病態はどれか。",
  choices:[["a","原発性硬化性胆管炎"],["b","急性膵炎"],["c","急性肝炎"],["d","劇症肝炎"],["e","薬物性肝障害"]],
  answer:["d"],
  expl:"既往感染者（HBs抗原陰性・HBc抗体陽性）が化学療法後にHBs抗原陽性化した典型的なde novo B型肝炎（HBV再活性化）。著明な肝逸脱酵素上昇、PT-INR延長、高アンモニア血症・意識障害から劇症肝炎（急性肝不全）。既往感染例は見落とされやすく重症化しやすい。"
},
{
  id:5, cat:"C型肝炎", type:"single", ref:"cf. 118A35",
  case:"71歳の男性。C型肝炎ウイルスに現在感染している可能性が極めて高いと判定され受診。12歳時に輸血歴あり。HCV抗体陽性、HCV-RNA陽性。",
  q:"第一選択薬はどれか。",
  choices:[["a","インターフェロン"],["b","核酸アナログ製剤"],["c","グルココルチコイド"],["d","ウルソデオキシコール酸"],["e","直接作用型抗ウイルス薬〈DAA〉"]],
  answer:["e"],
  expl:"C型肝炎の第一選択は経口のDAA。8〜12週投与で著効率90%超、副作用も少なく、慢性肝炎から非代償性肝硬変まで治療可能。核酸アナログはB型肝炎の薬剤で混同に注意。"
},
{
  id:6, cat:"肝硬変", type:"single", ref:"cf. 115B24",
  q:"肝硬変患者の肝性脳症の誘因とならないのはどれか。",
  choices:[["a","感染"],["b","脱水"],["c","便秘"],["d","蛋白制限"],["e","消化管出血"]],
  answer:["d"],
  expl:"肝性脳症は血中アンモニア上昇で生じる。誘因は消化管出血・便秘（腸管でのアンモニア産生増加）、脱水・電解質異常、感染など。蛋白は制限ではなく“過剰摂取”が誘因になる。治療ではラクツロースやBCAA製剤を用いる。"
},
{
  id:7, cat:"肝血管腫", type:"multiple", ref:"cf. 111D22",
  q:"肝海綿状血管腫について正しいのはどれか。2つ選べ。",
  choices:[["a","MRIのT2強調画像で著明な高信号を示す"],["b","悪性化のリスクが高く早期切除が必要である"],["c","造影早期に辺縁から染まり全体が染まり切らない"],["d","破裂しやすいため注意を要する"],["e","肝硬変を背景に発生することが多い"]],
  answer:["a","c"],
  expl:"海綿状血管腫は最も頻度の高い肝良性腫瘍。血液が充満する構造を反映し、T2強調画像で著明な高信号、造影では辺縁から徐々に濃染し後期に全体が染まる。悪性化はなく経過観察でよい。破裂は極めて稀。背景肝疾患とは無関係に生じる。"
},
{
  id:8, cat:"肝細胞癌", type:"single", ref:"cf. 117F16",
  q:"肝細胞癌に対する肝動脈化学塞栓術〈TACE〉が禁忌となるのはどれか。",
  choices:[["a","腫瘍径が3cmを超える"],["b","腫瘍が多発している"],["c","門脈主要分枝が閉塞している"],["d","血清AFPが高値である"],["e","肝硬変を合併している"]],
  answer:["c"],
  expl:"TACEは肝動脈を塞栓する治療。非癌部は門脈血流に支えられるため梗塞を免れるが、門脈主要分枝が閉塞していると塞栓により肝梗塞・肝不全を起こすため禁忌。腫瘍径・個数は成績に影響するが絶対禁忌ではない。"
},
{
  id:9, cat:"肝細胞癌", type:"multiple", ref:"cf. 118F20",
  q:"肝細胞癌に対するラジオ波焼灼療法〈RFA〉について正しいのはどれか。2つ選べ。",
  choices:[["a","一般に径3cm以下・3個以下が適応となる"],["b","焼灼範囲は癌細胞が確実に死滅し根治性がある"],["c","肝外転移例のコントロールに用いる"],["d","門脈本幹を塞栓してから施行する"],["e","肝機能不良（Child C）の第一選択である"]],
  answer:["a","b"],
  expl:"RFAは電極針を癌に穿刺し熱凝固する穿刺局所療法。1回で約3cm焼灼でき、径3cm以下・3個以下が良い適応で、焼灼範囲は確実に壊死し根治性がある。肝外転移の制御には用いず、Child Cは移植や緩和の対象。"
},
{
  id:10, cat:"肝細胞癌", type:"single", ref:"cf. 115A8",
  q:"肝細胞癌に対する肝切除を予定する患者で、肝予備能を判断する際に重要でないのはどれか。",
  choices:[["a","血清アルブミン値"],["b","ICG試験15分値"],["c","血清総ビリルビン値"],["d","プロトロンビン時間"],["e","α-フェトプロテイン〈AFP〉値"]],
  answer:["e"],
  expl:"肝予備能はアルブミン・ビリルビン・PT・腹水・脳症（Child-Pugh）やICG15分値で評価する。AFPは肝細胞癌の腫瘍マーカーであり、腫瘍の存在・進行の指標ではあるが肝予備能の評価には用いない。"
}
];

const LS_KEY = "kokushi_shokaki_stats_v1";
let quiz = [], idx = 0, selected = [], answered = false, session = [];
let numChoice = 10, orderChoice = "順番";

const main = document.getElementById('main');
const footer = document.getElementById('footer');
const hCount = document.getElementById('hCount');
const hTitle = document.getElementById('hTitle');
const prog = document.getElementById('prog');

function loadStats(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }
function saveStat(id, correct){
  try{
    const s = loadStats();
    if(!s[id]) s[id] = {seen:0, ok:0};
    s[id].seen++; if(correct) s[id].ok++;
    localStorage.setItem(LS_KEY, JSON.stringify(s));
  }catch(e){}
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function renderStart(){
  hCount.textContent = ""; prog.style.width = "0%"; hTitle.textContent = "カテゴリーⅠ 消化器";
  const stats = loadStats();
  const totalSeen = Object.values(stats).reduce((x,v)=>x+v.seen,0);
  const totalOk = Object.values(stats).reduce((x,v)=>x+v.ok,0);
  const rate = totalSeen? Math.round(totalOk/totalSeen*100):0;
  const nums = [5,10];
  main.innerHTML = `
    <div class="hero">
      <h1>消化器 予想問題</h1>
      <p>肝炎・肝腫瘍　全${QUESTIONS.length}問（試作版）</p>
    </div>
    <div class="stat">
      <div class="c"><div class="n">${QUESTIONS.length}</div><div class="l">収録問題</div></div>
      <div class="c"><div class="n">${totalSeen}</div><div class="l">のべ解答数</div></div>
      <div class="c"><div class="n">${rate}%</div><div class="l">累計正答率</div></div>
    </div>
    <div class="panel">
      <h2>出題数</h2>
      <div class="seg" id="segNum">
        ${nums.map(n=>`<button data-n="${n}" class="${n===numChoice?'on':''}">${n}問</button>`).join('')}
        <button data-n="all" class="${numChoice==='all'?'on':''}">全部</button>
      </div>
    </div>
    <div class="panel">
      <h2>出題順</h2>
      <div class="seg" id="segOrder">
        <button data-o="順番" class="${orderChoice==='順番'?'on':''}">順番どおり</button>
        <button data-o="ランダム" class="${orderChoice==='ランダム'?'on':''}">ランダム</button>
      </div>
    </div>`;
  footer.innerHTML = `<button class="btn" id="startBtn">演習をはじめる</button>`;
  document.getElementById('segNum').onclick = e=>{
    const b=e.target.closest('button'); if(!b)return;
    numChoice = b.dataset.n==='all'?'all':parseInt(b.dataset.n);
    [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  };
  document.getElementById('segOrder').onclick = e=>{
    const b=e.target.closest('button'); if(!b)return;
    orderChoice = b.dataset.o;
    [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  };
  document.getElementById('startBtn').onclick = startQuiz;
}

function startQuiz(){
  let pool = orderChoice==='ランダム'? shuffle(QUESTIONS) : QUESTIONS.slice();
  const n = numChoice==='all'? pool.length : Math.min(numChoice, pool.length);
  quiz = pool.slice(0, n); idx = 0; session = [];
  renderQuestion();
}

function renderQuestion(){
  const item = quiz[idx];
  selected = []; answered = false;
  hTitle.textContent = "カテゴリーⅠ 消化器";
  hCount.textContent = `${idx+1} / ${quiz.length}`;
  prog.style.width = ((idx)/quiz.length*100)+"%";
  const multi = item.type==='multiple';
  main.innerHTML = `
    <div class="tags">
      <span class="tag">${item.cat}</span>
      <span class="tag k">${item.ref||''}</span>
      <span class="tag k">${multi?'複数選択':'単一選択'}</span>
    </div>
    ${item.case? `<div class="case">${item.case}</div>`:''}
    <p class="q">${item.q}</p>
    <p class="hint">${multi?'あてはまるものをすべて選び、解答するを押す':'1つ選ぶと解答できる'}</p>
    <div id="opts">
      ${item.choices.map(([k,t])=>`
        <div class="opt" data-k="${k}"><span class="k">${k}</span><span>${t}</span></div>`).join('')}
    </div>`;
  footer.innerHTML = `<button class="btn" id="ansBtn" disabled>解答する</button>`;
  document.getElementById('opts').onclick = e=>{
    if(answered) return;
    const o = e.target.closest('.opt'); if(!o) return;
    const k = o.dataset.k;
    if(multi){
      if(selected.includes(k)){ selected=selected.filter(x=>x!==k); o.classList.remove('sel'); }
      else { selected.push(k); o.classList.add('sel'); }
    } else {
      selected=[k];
      [...e.currentTarget.children].forEach(x=>x.classList.toggle('sel',x===o));
    }
    document.getElementById('ansBtn').disabled = selected.length===0;
  };
  document.getElementById('ansBtn').onclick = checkAnswer;
}

function eqSet(a,b){ return a.length===b.length && a.every(x=>b.includes(x)); }

function checkAnswer(){
  const item = quiz[idx];
  answered = true;
  const correct = eqSet(selected, item.answer);
  session.push({id:item.id, correct});
  saveStat(item.id, correct);
  prog.style.width = ((idx+1)/quiz.length*100)+"%";
  document.querySelectorAll('#opts .opt').forEach(o=>{
    const k=o.dataset.k;
    o.classList.remove('sel'); o.style.cursor='default';
    const isAns = item.answer.includes(k);
    const isSel = selected.includes(k);
    if(isAns){
      o.classList.add('correct');
      o.insertAdjacentHTML('beforeend', `<span class="badge b-ok">正解${isSel?'／選択':''}</span>`);
    } else if(isSel){
      o.classList.add('wrong');
      o.insertAdjacentHTML('beforeend', `<span class="badge b-miss">あなたの解答</span>`);
    } else { o.classList.add('plain'); }
  });
  const head = `
    <div class="result-head ${correct?'hit':'miss'}">
      <span class="mark" style="background:${correct?'var(--ok)':'var(--accent)'}">${correct?'◎':'×'}</span>
      ${correct?'正解':'不正解'}
    </div>`;
  const expl = `<div class="expl"><div class="lab">解説</div><div>${item.expl}</div></div>`;
  main.insertAdjacentHTML('beforeend', head+expl);
  main.querySelector('.expl').scrollIntoView({behavior:'smooth', block:'nearest'});
  const last = idx===quiz.length-1;
  footer.innerHTML = `<button class="btn" id="nextBtn">${last?'結果を見る':'次の問題 →'}</button>`;
  document.getElementById('nextBtn').onclick = ()=>{
    if(last){ renderResult(); } else { idx++; renderQuestion(); main.scrollTop=0; }
  };
}

function renderResult(){
  const ok = session.filter(s=>s.correct).length;
  const total = session.length;
  const rate = Math.round(ok/total*100);
  hCount.textContent = ""; prog.style.width = "100%"; hTitle.textContent = "結果";
  const wrong = session.filter(s=>!s.correct);
  main.innerHTML = `
    <div class="score">
      <div class="big">${ok} / ${total}</div>
      <div class="lab">正答率 ${rate}%</div>
    </div>
    ${wrong.length? `<div class="panel"><h2>復習（間違えた問題 ${wrong.length}）</h2></div>` : `<div class="panel"><h2>全問正解。おつかれさま</h2></div>`}
    <div id="reviewList">
      ${wrong.map(w=>{
        const it = QUESTIONS.find(q=>q.id===w.id);
        return `<div class="review-item">
          <div class="h"><span class="dot" style="background:var(--accent)">×</span><span>${it.cat}・${it.ref||''}</span></div>
          <div style="font-size:14px;margin-bottom:6px">${it.q}</div>
          <div style="font-size:12px;color:var(--sub)">正解：${it.answer.join('・')}　${it.choices.filter(c=>it.answer.includes(c[0])).map(c=>c[1]).join(' / ')}</div>
          <div style="font-size:12px;margin-top:6px">${it.expl}</div>
        </div>`;
      }).join('')}
    </div>`;
  footer.innerHTML = `
    <div class="row">
      <button class="btn ghost" id="homeBtn" style="flex:1">最初の画面へ</button>
      <button class="btn" id="againBtn" style="flex:1">もう一度</button>
    </div>`;
  document.getElementById('homeBtn').onclick = renderStart;
  document.getElementById('againBtn').onclick = ()=>{ startQuiz(); main.scrollTop=0; };
}

renderStart();
</script>
</body>
</html>
