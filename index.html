<style>
  :root{
    --accent:#185FA5; --accent-bg:#E6F1FB; --accent-line:#378ADD;
    --ok:#0F6E56; --ok-bg:#E1F5EE;
    --page:#F1EFE8; --card:#FFFFFF; --ink:#23231f; --sub:#5F5E5A; --muted:#888780;
    --line:#D3D1C7; --line2:#B4B2A9;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --accent:#85B7EB; --accent-bg:#0C447C; --accent-line:#378ADD;
      --ok:#5DCAA5; --ok-bg:#085041;
      --page:#1a1a18; --card:#26261f; --ink:#ECEAE2; --sub:#B4B2A9; --muted:#888780;
      --line:#3a3a34; --line2:#55554c;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--page); color:var(--ink); line-height:1.7;
    display:flex; justify-content:center; min-height:100vh;
  }
  #app{width:100%; max-width:480px; background:var(--card); min-height:100vh; display:flex; flex-direction:column}
  header{padding:12px 16px; border-bottom:.5px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px}
  header .t{font-size:13px; color:var(--sub)}
  header .count{font-size:13px; color:var(--sub); white-space:nowrap}
  .bar{height:5px; background:var(--page); overflow:hidden}
  .bar>div{height:100%; background:var(--accent); width:0; transition:width .25s}
  main{flex:1; padding:16px; overflow-y:auto}
  footer{padding:12px 16px 20px; border-top:.5px solid var(--line)}
  .btn{display:block; width:100%; text-align:center; font-size:15px; font-weight:500;
    padding:14px; border-radius:12px; border:none; cursor:pointer; background:var(--accent); color:#fff}
  .btn:disabled{opacity:.4; cursor:default}
  .btn.ghost{background:transparent; border:.5px solid var(--line2); color:var(--sub); font-weight:400}
  .row{display:flex; gap:8px}
  .hero{text-align:center; padding:24px 8px 8px}
  .hero h1{font-size:22px; font-weight:600; margin:0 0 6px}
  .hero p{font-size:14px; color:var(--sub); margin:0}
  .panel{background:var(--page); border-radius:12px; padding:16px; margin:16px 0}
  .panel h2{font-size:13px; color:var(--sub); font-weight:500; margin:0 0 10px}
  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{flex:1; min-width:64px; padding:10px; border-radius:10px; border:.5px solid var(--line2);
    background:var(--card); color:var(--ink); font-size:14px; cursor:pointer}
  .seg button.on{border:2px solid var(--accent); background:var(--accent-bg); color:var(--accent); font-weight:500}
  .stat{display:flex; gap:8px; margin:16px 0}
  .stat .c{flex:1; background:var(--page); border-radius:12px; padding:12px; text-align:center}
  .stat .c .n{font-size:22px; font-weight:600}
  .stat .c .l{font-size:11px; color:var(--muted)}
  .tags{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
  .tag{font-size:11px; padding:3px 10px; border-radius:99px; background:var(--accent-bg); color:var(--accent)}
  .tag.k{background:var(--page); color:var(--sub)}
  .case{background:var(--page); border-radius:12px; padding:12px 14px; font-size:13px; margin-bottom:12px; white-space:pre-wrap}
  .q{font-size:15px; font-weight:500; margin:0 0 4px}
  .hint{font-size:12px; color:var(--muted); margin:0 0 14px}
  .opt{display:flex; align-items:flex-start; gap:10px; border:.5px solid var(--line2); border-radius:12px;
    padding:11px 13px; margin-bottom:9px; font-size:14px; cursor:pointer; background:var(--card)}
  .opt .k{flex:0 0 24px; height:24px; border-radius:50%; background:var(--page); display:flex;
    align-items:center; justify-content:center; font-size:13px; font-weight:500; margin-top:1px}
  .opt.sel{border:2px solid var(--accent); background:var(--accent-bg); color:var(--accent)}
  .opt.sel .k{background:var(--accent); color:#fff}
  .opt.correct{border:2px solid var(--ok); background:var(--ok-bg); color:var(--ok); cursor:default}
  .opt.correct .k{background:var(--ok); color:#fff}
  .opt.wrong{border:.5px solid var(--line); color:var(--muted); text-decoration:line-through; cursor:default}
  .opt.wrong .k{background:var(--page)}
  .opt.plain{cursor:default; opacity:.7}
  .badge{margin-left:auto; font-size:11px; font-weight:500; padding:2px 8px; border-radius:99px; white-space:nowrap; text-decoration:none}
  .badge.b-ok{background:var(--ok); color:#fff}
  .badge.b-miss{background:var(--line2); color:var(--card)}
  .result-head{display:flex; align-items:center; gap:8px; font-size:16px; font-weight:600; margin:4px 0 12px}
  .result-head.hit{color:var(--ok)}
  .result-head.miss{color:var(--accent)}
  .mark{width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff}
  .expl{background:var(--page); border-radius:12px; padding:13px 14px; font-size:13px}
  .expl .lab{font-size:12px; font-weight:500; color:var(--sub); margin-bottom:5px}
  .score{text-align:center; padding:20px 8px}
  .score .big{font-size:44px; font-weight:600; color:var(--accent)}
  .score .lab{font-size:14px; color:var(--sub)}
  .review-item{border:.5px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px}
  .review-item .h{display:flex; gap:8px; align-items:center; font-size:13px; margin-bottom:4px}
  .dot{width:16px;height:16px;border-radius:50%;flex:0 0 16px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
</style>
</head>

<script>
const QUESTIONS = [{"id": 1, "group": "肝臓", "cat": "肝炎ウイルス", "type": "multiple", "ref": "cf. 111I31", "case": "", "q": "慢性化しやすい（持続感染に移行しうる）肝炎ウイルスはどれか。2つ選べ。", "choices": [["a", "A型"], ["b", "B型"], ["c", "C型"], ["d", "D型"], ["e", "E型"]], "answer": ["b", "c"], "expl": "HBVは乳児期感染でキャリア化、成人感染でもgenotype Aで約10%が慢性化。HCVは約70%と高率に慢性化する。A型・E型は基本的に一過性で慢性化しない（E型は移植後など免疫抑制状態でのみ例外的に慢性化）。D型はHBVと共存して初めて成立する。"}, {"id": 2, "group": "肝臓", "cat": "E型肝炎", "type": "single", "ref": "cf. 112B34", "case": "35歳の男性。黄疸を主訴に来院。1週間前から全身倦怠感があり、2日前に眼の黄染を指摘された。1か月前にシカ肉を焼いて食べたが一部生焼けであった。海外渡航歴なし。\n血液所見：AST 406 U/L、ALT 498 U/L、総ビリルビン 4.5 mg/dL、PT-INR 1.0。HBs抗原陰性、HCV抗体陰性。", "q": "対応として正しいのはどれか。", "choices": [["a", "安静を指示する"], ["b", "血漿交換を行う"], ["c", "シクロスポリンを投与する"], ["d", "インターフェロンを投与する"], ["e", "内視鏡的胆道ドレナージを行う"]], "answer": ["a"], "expl": "人獣共通感染症であるE型肝炎（イノシシ・シカ・ブタの生肉が感染源）。急性肝炎はA型に類似し、PT-INRも保たれ劇症化していない。治療は保存的（安静）が基本。抗ウイルス薬や血漿交換は不要。"}, {"id": 3, "group": "肝臓", "cat": "針刺し事故", "type": "single", "ref": "cf. 119F40", "case": "26歳の女性。臨床研修1年目。HBs抗原陽性患者の手術中に針刺し事故を起こした。ただちに流水で洗浄。B型肝炎の罹患歴はなく、4年前にHBワクチンを接種し、入職時のHBs抗体価は十分に高かった。", "q": "適切な対応はどれか。", "choices": [["a", "経過観察"], ["b", "HBワクチン接種"], ["c", "核酸アナログ製剤投与"], ["d", "抗HBsヒト免疫グロブリン投与"], ["e", "HBワクチン接種および抗HBsヒト免疫グロブリン投与"]], "answer": ["a"], "expl": "HBワクチン接種歴があり抗体価が十分に高い（=獲得免疫がある）者は、HBs抗原陽性患者からの曝露でも追加の予防処置は不要で経過観察でよい。抗体が不十分または未獲得の場合に、48時間以内のHBIG＋ワクチンを行う。"}, {"id": 4, "group": "肝臓", "cat": "HBV再活性化", "type": "single", "ref": "cf. 116D49", "case": "77歳の女性。意識障害で搬入。1年前まで非ホジキンリンパ腫の治療を受け「治癒した」と言われていた。治療前のB型肝炎マーカーはHBs抗原陰性・HBs抗体陽性・HBc抗体陽性であった。\n現在：AST 3,956 U/L、ALT 2,824 U/L、総ビリルビン 3.2 mg/dL、PT-INR 2.1、アンモニア 186 μg/dL。HBs抗原陽性、HBV-DNA陽性。", "q": "考えられる病態はどれか。", "choices": [["a", "原発性硬化性胆管炎"], ["b", "急性膵炎"], ["c", "急性肝炎"], ["d", "劇症肝炎"], ["e", "薬物性肝障害"]], "answer": ["d"], "expl": "既往感染者（HBs抗原陰性・HBc抗体陽性）が化学療法後にHBs抗原陽性化した典型的なde novo B型肝炎（HBV再活性化）。著明な肝逸脱酵素上昇、PT-INR延長、高アンモニア血症・意識障害から劇症肝炎（急性肝不全）。既往感染例は見落とされやすく重症化しやすい。"}, {"id": 5, "group": "肝臓", "cat": "C型肝炎", "type": "single", "ref": "cf. 118A35", "case": "71歳の男性。C型肝炎ウイルスに現在感染している可能性が極めて高いと判定され受診。12歳時に輸血歴あり。HCV抗体陽性、HCV-RNA陽性。", "q": "第一選択薬はどれか。", "choices": [["a", "インターフェロン"], ["b", "核酸アナログ製剤"], ["c", "グルココルチコイド"], ["d", "ウルソデオキシコール酸"], ["e", "直接作用型抗ウイルス薬〈DAA〉"]], "answer": ["e"], "expl": "C型肝炎の第一選択は経口のDAA。8〜12週投与で著効率90%超、副作用も少なく、慢性肝炎から非代償性肝硬変まで治療可能。核酸アナログはB型肝炎の薬剤で混同に注意。"}, {"id": 6, "group": "肝臓", "cat": "肝硬変", "type": "single", "ref": "cf. 115B24", "case": "", "q": "肝硬変患者の肝性脳症の誘因とならないのはどれか。", "choices": [["a", "感染"], ["b", "脱水"], ["c", "便秘"], ["d", "蛋白制限"], ["e", "消化管出血"]], "answer": ["d"], "expl": "肝性脳症は血中アンモニア上昇で生じる。誘因は消化管出血・便秘（腸管でのアンモニア産生増加）、脱水・電解質異常、感染など。蛋白は制限ではなく“過剰摂取”が誘因になる。治療ではラクツロースやBCAA製剤を用いる。"}, {"id": 7, "group": "肝臓", "cat": "肝血管腫", "type": "multiple", "ref": "cf. 111D22", "case": "", "q": "肝海綿状血管腫について正しいのはどれか。2つ選べ。", "choices": [["a", "MRIのT2強調画像で著明な高信号を示す"], ["b", "悪性化のリスクが高く早期切除が必要である"], ["c", "造影早期に辺縁から染まり全体が染まり切らない"], ["d", "破裂しやすいため注意を要する"], ["e", "肝硬変を背景に発生することが多い"]], "answer": ["a", "c"], "expl": "海綿状血管腫は最も頻度の高い肝良性腫瘍。血液が充満する構造を反映し、T2強調画像で著明な高信号、造影では辺縁から徐々に濃染し後期に全体が染まる。悪性化はなく経過観察でよい。破裂は極めて稀。背景肝疾患とは無関係に生じる。"}, {"id": 8, "group": "肝臓", "cat": "肝細胞癌", "type": "single", "ref": "cf. 117F16", "case": "", "q": "肝細胞癌に対する肝動脈化学塞栓術〈TACE〉が禁忌となるのはどれか。", "choices": [["a", "腫瘍径が3cmを超える"], ["b", "腫瘍が多発している"], ["c", "門脈主要分枝が閉塞している"], ["d", "血清AFPが高値である"], ["e", "肝硬変を合併している"]], "answer": ["c"], "expl": "TACEは肝動脈を塞栓する治療。非癌部は門脈血流に支えられるため梗塞を免れるが、門脈主要分枝が閉塞していると塞栓により肝梗塞・肝不全を起こすため禁忌。腫瘍径・個数は成績に影響するが絶対禁忌ではない。"}, {"id": 9, "group": "肝臓", "cat": "肝細胞癌", "type": "multiple", "ref": "cf. 118F20", "case": "", "q": "肝細胞癌に対するラジオ波焼灼療法〈RFA〉について正しいのはどれか。2つ選べ。", "choices": [["a", "一般に径3cm以下・3個以下が適応となる"], ["b", "焼灼範囲は癌細胞が確実に死滅し根治性がある"], ["c", "肝外転移例のコントロールに用いる"], ["d", "門脈本幹を塞栓してから施行する"], ["e", "肝機能不良（Child C）の第一選択である"]], "answer": ["a", "b"], "expl": "RFAは電極針を癌に穿刺し熱凝固する穿刺局所療法。1回で約3cm焼灼でき、径3cm以下・3個以下が良い適応で、焼灼範囲は確実に壊死し根治性がある。肝外転移の制御には用いず、Child Cは移植や緩和の対象。"}, {"id": 10, "group": "肝臓", "cat": "肝細胞癌", "type": "single", "ref": "cf. 115A8", "case": "", "q": "肝細胞癌に対する肝切除を予定する患者で、肝予備能を判断する際に重要でないのはどれか。", "choices": [["a", "血清アルブミン値"], ["b", "ICG試験15分値"], ["c", "血清総ビリルビン値"], ["d", "プロトロンビン時間"], ["e", "α-フェトプロテイン〈AFP〉値"]], "answer": ["e"], "expl": "肝予備能はアルブミン・ビリルビン・PT・腹水・脳症（Child-Pugh）やICG15分値で評価する。AFPは肝細胞癌の腫瘍マーカーであり、腫瘍の存在・進行の指標ではあるが肝予備能の評価には用いない。"}, {"id": 11, "group": "大腸・IBD", "cat": "大腸の血管支配・虚血", "type": "single", "ref": "大腸の血管解剖（Griffith点）", "case": "", "q": "大腸のうち上腸間膜動脈（SMA）と下腸間膜動脈（IMA）の支配境界にあたり、側副血行に乏しく虚血に陥りやすい部位はどれか。", "choices": [["a", "盲腸"], ["b", "上行結腸"], ["c", "左結腸曲（脾彎曲部）"], ["d", "上部直腸"], ["e", "肛門管"]], "answer": ["c"], "expl": "左結腸曲はGriffith点にあたり、SMA領域（中結腸動脈）とIMA領域（左結腸動脈）の分水嶺で側副血行が乏しく虚血に脆弱。虚血性大腸炎はこの左結腸曲と、S状結腸直腸移行部のSudeck点に好発する。"}, {"id": 12, "group": "大腸・IBD", "cat": "リンパ節郭清", "type": "single", "ref": "大腸癌のリンパ節郭清（D3郭清）", "case": "", "q": "進行大腸癌に対するD3郭清で郭清範囲に含まれるリンパ節はどこまでか。", "choices": [["a", "腸管傍リンパ節のみ"], ["b", "中間リンパ節まで"], ["c", "主リンパ節まで"], ["d", "傍大動脈リンパ節まで"], ["e", "鎖骨上（Virchow）リンパ節まで"]], "answer": ["c"], "expl": "大腸癌のリンパ流は腸管傍→中間→主リンパ節の順に進む。郭清度はD1（腸管傍）、D2（中間）、D3（主リンパ節）と定義され、進行癌に対する標準郭清はD3。なおリンパ節転移が腫瘍縁から10cm以上離れることはまれで、これが腸管切離線（腫瘍から約10cm）の根拠となる。"}, {"id": 13, "group": "大腸・IBD", "cat": "術後合併症（縫合不全）", "type": "single", "ref": "直腸癌術後合併症", "case": "68歳の男性。下部直腸癌に対し低位前方切除術（自動吻合器による器械吻合）を施行された。術後7日目に38.5℃の発熱と下腹部痛が出現。腹部は下腹部に筋性防御と反跳痛を認め、骨盤内ドレーンから混濁した便汁様の排液がみられる。血液検査でCRP 18mg/dL、白血球14,000/μL。", "q": "最も考えられる術後合併症はどれか。", "choices": [["a", "術後出血"], ["b", "縫合不全"], ["c", "麻痺性イレウス"], ["d", "表層創部感染"], ["e", "深部静脈血栓症"]], "answer": ["b"], "expl": "縫合不全は術後10日以内の発症が多く、吻合部が低い低位前方切除で高リスク。発熱・腹膜刺激症状に加え、骨盤ドレーンからの便汁様・膿性排液は縫合不全（骨盤腹膜炎）に典型的。術後出血は術後2〜3日以内に多い。"}, {"id": 14, "group": "大腸・IBD", "cat": "直腸癌の再発形式", "type": "single", "ref": "直腸癌の転移・再発形式", "case": "", "q": "結腸癌と比較した直腸癌の転移・再発形式の特徴として正しいのはどれか。", "choices": [["a", "腹膜播種が最も多い"], ["b", "局所（骨盤内）再発と肺転移が多い"], ["c", "骨転移が再発形式の第一位である"], ["d", "脳転移が高頻度にみられる"], ["e", "結腸癌より再発率が低い"]], "answer": ["b"], "expl": "直腸は中・下直腸静脈を介して体循環系にも流入するため肺転移が多く、また骨盤内の狭い術野での手術操作の制約から局所再発が多い。これが直腸癌に対する術前放射線・化学療法（局所制御目的）が重視される背景である。"}, {"id": 15, "group": "大腸・IBD", "cat": "術後補助化学療法", "type": "multiple", "ref": "大腸癌の術後補助化学療法", "case": "", "q": "大腸癌の術後補助化学療法について正しいものを2つ選べ。", "choices": [["a", "StageⅢ大腸癌に推奨される"], ["b", "R0切除（治癒切除）が行われた症例が対象である"], ["c", "StageⅡ大腸癌では全例に明らかな生存率上昇が得られる"], ["d", "切除不能・進行再発大腸癌の延命を主目的とする"], ["e", "原則として手術前に投与する全身療法である"]], "answer": ["a", "b"], "expl": "術後補助化学療法はR0切除された治癒切除例に対し微小転移を根絶し再発を抑える目的で術後に行う。StageⅢで推奨（PS0〜1・主要臓器機能保持が条件）。StageⅡは全体では有意な生存率上昇が示されず、再発高リスク例で適応を考慮するにとどまる。切除不能例の延命目的は緩和的（全身）化学療法であり、補助療法とは区別される。"}, {"id": 16, "group": "大腸・IBD", "cat": "化学療法の副作用", "type": "multiple", "ref": "大腸癌薬物療法の有害事象", "case": "", "q": "大腸癌に用いる薬剤と特徴的な有害事象の組合せで正しいものを2つ選べ。", "choices": [["a", "オキサリプラチン ── 末梢神経障害（寒冷で誘発・増悪）"], ["b", "セツキシマブ ── ざ瘡様皮疹・爪囲炎"], ["c", "ベバシズマブ ── 間質性肺炎を最も特徴的な毒性とする"], ["d", "5-FU ── 必発する重篤な腎不全"], ["e", "イリノテカン ── 用量規定毒性としての手足症候群"]], "answer": ["a", "b"], "expl": "オキサリプラチン（L-OHP）は蓄積性の末梢神経障害が特徴で寒冷刺激で誘発される。抗EGFR抗体（セツキシマブ・パニツムマブ）はざ瘡様皮疹・爪囲炎・皮膚乾燥をきたす。ベバシズマブ（抗VEGF）の特徴は高血圧・蛋白尿・出血・消化管穿孔・創傷治癒遅延で、間質性肺炎が主ではない。手足症候群はカペシタビン／5-FU系で問題となり、イリノテカンの主毒性は下痢と好中球減少。"}, {"id": 17, "group": "大腸・IBD", "cat": "潰瘍性大腸炎の手術適応", "type": "multiple", "ref": "潰瘍性大腸炎の絶対的手術適応", "case": "", "q": "潰瘍性大腸炎の絶対的手術適応にあたるものを2つ選べ。", "choices": [["a", "中毒性巨大結腸症"], ["b", "大腸穿孔"], ["c", "保存的治療に抵抗する壊疽性膿皮症"], ["d", "内科治療で改善しないQOL低下を伴う難治例"], ["e", "low grade dysplasia（UC-Ⅲ）"]], "answer": ["a", "b"], "expl": "潰瘍性大腸炎の絶対的手術適応は、大腸穿孔・大量出血・中毒性巨大結腸症、強力な内科治療が無効な重症/劇症型、大腸癌およびhigh grade dysplasia（UC-Ⅳ）。壊疽性膿皮症などの腸管外合併症、難治例、low grade dysplasia（UC-Ⅲ）は相対的手術適応にとどまる。"}, {"id": 18, "group": "大腸・IBD", "cat": "クローン病の外科治療", "type": "single", "ref": "クローン病腸管病変の術式選択", "case": "28歳の男性。10年来のクローン病（小腸型）。複数箇所の小腸狭窄による腸閉塞症状を繰り返しており、内科治療で改善が得られず手術を予定している。上部・下部の小腸に多発する短い狭窄が広範囲に分布している。", "q": "外科治療の方針として最も適切なのはどれか。", "choices": [["a", "再発予防のため病変を含め広範囲に小腸を切除する"], ["b", "腸管温存を原則とし、多発狭窄には狭窄形成術（strictureplasty）を考慮する"], ["c", "多発狭窄では第一選択として大腸全摘を行う"], ["d", "小腸の1/2以上を切除して確実に病変を除去する"], ["e", "病変部を切除せず永久回腸人工肛門のみ造設する"]], "answer": ["b"], "expl": "クローン病は再発を繰り返し切除を重ねると短腸症候群のリスクがあるため腸管温存が原則。病変は小範囲切除にとどめ、狭窄が広範囲に多発する場合は広範囲切除を避けて狭窄形成術を行う。小腸を1/3以上切除することは避ける。"}, {"id": 19, "group": "食道・胃", "cat": "門脈系の解剖", "type": "single", "ref": "cf.105E6", "case": "", "q": "門脈に流入しない静脈はどれか。", "choices": [["a", "脾静脈"], ["b", "左胃静脈"], ["c", "内腸骨静脈"], ["d", "上腸間膜静脈"], ["e", "下腸間膜静脈"]], "answer": ["c"], "expl": "門脈は脾静脈と上腸間膜静脈の合流部から始まり、左胃静脈・右胃静脈なども流入する。下腸間膜静脈は脾静脈に合流し門脈系に入る。内腸骨静脈は骨盤内臓の血液を下大静脈系へ運ぶ体循環系の静脈で、門脈には流入しない。"}, {"id": 20, "group": "食道・胃", "cat": "胃切除後症候群", "type": "single", "ref": "cf.104G45", "case": "46歳の男性。脱力感を主訴に来院した。3か月前、胃癌のため胃全摘術を受けた。1か月前から食後2、3時間すると脱力感が出現し、動悸、冷汗および手指振戦を認めるようになった。意識は清明。眼瞼結膜に貧血を認めない。腹部は平坦・軟で、正中部に手術創瘢痕を認める。", "q": "この病態に関係しているのはどれか。", "choices": [["a", "インスリン"], ["b", "セロトニン"], ["c", "ヒスタミン"], ["d", "ブラジキニン"], ["e", "ソマトスタチン"]], "answer": ["a"], "expl": "胃全摘後、食後2〜3時間で低血糖症状（脱力・動悸・冷汗・手指振戦）を呈しており後期ダンピング症候群である。糖質の急速な小腸流入による急激な血糖上昇に反応したインスリンの過剰分泌が反応性低血糖を引き起こす。セロトニン・ヒスタミン・ブラジキニンは早期ダンピング症候群で過分泌される消化管ホルモン等である。"}, {"id": 21, "group": "食道・胃", "cat": "胃癌・深達度", "type": "single", "ref": "cf.114C25", "case": "", "q": "早期胃癌の定義として正しいのはどれか。", "choices": [["a", "リンパ節転移を認めないもの"], ["b", "腫瘍径が2cm以下のもの"], ["c", "深達度が粘膜下層までにとどまるもの"], ["d", "固有筋層まで浸潤したもの"], ["e", "遠隔転移を認めないもの"]], "answer": ["c"], "expl": "早期胃癌は深達度が粘膜下層（SM）までにとどまるものと定義され、リンパ節転移の有無や腫瘍径は問わない。固有筋層以下に浸潤したものは進行胃癌である。深達度は治療方針決定・予後予測に重要である。"}, {"id": 22, "group": "食道・胃", "cat": "消化性潰瘍・外科治療", "type": "single", "ref": "消化性潰瘍穿孔", "case": "48歳の男性。突然発症した上腹部の激痛を主訴に救急搬入された。腹部は板状硬で筋性防御と反跳痛を認める。立位胸腹部単純X線でfree airを、造影CTで多量の腹水とfree airを認めた。バイタルは安定している。", "q": "手術を行う場合の術式として最も適切なのはどれか。", "choices": [["a", "幽門側胃切除術＋Billroth I法再建"], ["b", "穿孔部縫合＋大網充填術＋腹腔洗浄ドレナージ"], ["c", "胃全摘術＋Roux-en-Y再建"], ["d", "内視鏡的止血術"], ["e", "胃空腸バイパス術"]], "answer": ["b"], "expl": "所見は消化性潰瘍穿孔による汎発性腹膜炎（好発は十二指腸球部前壁）。手術では穿孔部縫合に大網充填を加え、腹腔内を洗浄しドレナージするのが標準的である。全身状態が保たれ条件を満たせば保存的治療（絶飲食・補液・経鼻胃管・抗菌薬・PPI静注）も選択されるが、手術時期を逸してはならない。"}, {"id": 23, "group": "食道・胃", "cat": "胃癌・遠隔転移", "type": "single", "ref": "cf.107D39", "case": "53歳の女性。下腹部のしこりを主訴に来院した。経腟超音波検査と腹部MRIで両側卵巣に充実性の腫瘤と少量の腹水を認める。CEA 15.7ng/mL（基準5以下）、CA19-9 17.5U/mL（基準37以下）、CA125 56.7U/mL（基準35以下）。摘出した卵巣腫瘍のH-E染色標本で印環細胞様の細胞を認めた。", "q": "原発巣を確定するために最も適切な検査はどれか。", "choices": [["a", "頭部CT"], ["b", "胸部CT"], ["c", "マンモグラフィ"], ["d", "上部消化管内視鏡検査"], ["e", "下部消化管内視鏡検査"]], "answer": ["d"], "expl": "両側卵巣の充実性腫瘤とCEA上昇、印環細胞様の組織像はKrukenberg腫瘍（胃癌の卵巣転移）を強く示唆する。原発巣として最も多いのは胃であり、上部消化管内視鏡検査が最も適切である。"}, {"id": 24, "group": "食道・胃", "cat": "胃癌・転移形式", "type": "multiple", "ref": "胃癌の転移・播種", "case": "", "q": "胃癌の転移・播種について正しいのはどれか。2つ選べ。", "choices": [["a", "Virchow転移は左鎖骨上窩リンパ節への転移である"], ["b", "Schnitzler転移はDouglas窩（直腸膀胱窩）への腹膜播種で直腸指診が有用である"], ["c", "Krukenberg腫瘍は肺への血行性転移である"], ["d", "胃癌の再発形式で最も多いのは肝転移である"], ["e", "Virchow転移は右鎖骨上窩に生じる"]], "answer": ["a", "b"], "expl": "Virchow転移は左鎖骨上窩リンパ節転移、Schnitzler転移はDouglas窩への腹膜播種で直腸指診が有用である。Krukenberg腫瘍は卵巣への転移（多くは腹膜播種を介する）であり肺転移ではない。胃癌の再発形式で最も多いのは腹膜播種である。"}, {"id": 25, "group": "食道・胃", "cat": "胃切除後の後遺症", "type": "multiple", "ref": "胃切除後症候群", "case": "", "q": "胃切除後の合併症・後遺症について正しいのはどれか。2つ選べ。", "choices": [["a", "胃全摘後の巨赤芽球性貧血はビタミンB12の吸収障害による"], ["b", "後期ダンピング症候群は反応性低血糖によって生じる"], ["c", "輸入脚症候群はBillroth I法に特有の合併症である"], ["d", "胃全摘後のビタミンB12欠乏の治療は経口投与が第一選択である"], ["e", "縫合不全は術後2〜3か月ごろに好発する"]], "answer": ["a", "b"], "expl": "胃全摘では壁細胞由来のCastle内因子が失われB12吸収障害から巨赤芽球性貧血（悪性貧血）を生じる（術後5〜10年で出現）。後期ダンピングはインスリン過剰分泌による反応性低血糖である。輸入脚症候群はBillroth II法・Roux-en-Y再建でみられる（B-Iでは起こらない）。B12は経口では吸収されず皮下注・筋注で補充する。縫合不全は多くが術後約10日までに生じる。"}, {"id": 26, "group": "食道・胃", "cat": "胃SMT・GIST", "type": "single", "ref": "胃粘膜下腫瘍・GIST", "case": "", "q": "消化管間葉系腫瘍（GIST）について正しいのはどれか。", "choices": [["a", "治療の第一選択は放射線治療である"], ["b", "系統的なリンパ節郭清が必須である"], ["c", "免疫染色でKIT（CD117）陽性が診断に有用である"], ["d", "発生頻度は大腸が最も高い"], ["e", "高リスク症例の術後補助療法にはトラスツズマブを用いる"]], "answer": ["c"], "expl": "GISTはHE染色のみでは平滑筋腫瘍などとの鑑別が困難で、免疫染色でKIT（CD117）陽性であれば診断される。治療の第一選択は外科的完全切除で、偽被膜を損傷せず断端陰性を得る臓器温存・部分切除が推奨される。リンパ節転移はまれで郭清は不要。発生頻度は胃が最も高い。高リスク例の術後補助療法にはイマチニブを用いる（トラスツズマブはHER2陽性胃癌に対する薬剤）。"}, {"id": 27, "group": "画像・内視鏡・病理", "cat": "肝血管腫（画像）", "type": "single", "ref": "肝血管腫の画像診断", "case": "", "q": "肝血管腫の画像所見として正しいのはどれか。", "choices": [["a", "超音波検査では内部が均一な低エコーを呈する"], ["b", "ダイナミックCTでは辺縁から結節状の造影が始まり、徐々に中心へ広がる"], ["c", "動脈相で腫瘍全体が均一に早期濃染し、平衡相でwash outされる"], ["d", "MRIのT2強調像で著明な低信号を示す"], ["e", "内部に石灰化を伴うことが多い"]], "answer": ["b"], "expl": "肝血管腫は肝の最多良性腫瘍。超音波では境界明瞭な高エコー、ダイナミックCT/MRIでは辺縁から結節状に造影が始まりゆっくり中心へ求心性に広がる（fill-in）のが特徴。T2強調像では嚢胞と間違えるほど著明な高信号を示す。早期濃染しwash outするのはHCCのパターン。"}, {"id": 28, "group": "画像・内視鏡・病理", "cat": "肝特異性造影MRI", "type": "single", "ref": "Gd-EOB造影MRI", "case": "", "q": "Gd-EOB-DTPA造影MRIにおける典型的な肝細胞癌〈HCC〉の所見として正しいのはどれか。", "choices": [["a", "動脈相では全く造影されない"], ["b", "肝細胞相で周囲肝実質より高信号を示す"], ["c", "肝細胞相で低信号を示す"], ["d", "肝細胞相で正常肝と等信号となり判別できない"], ["e", "造影剤は腎からのみ排泄される"]], "answer": ["c"], "expl": "Gd-EOBは血流評価に加え肝細胞機能を評価できる肝特異性造影剤。正常肝細胞には取り込まれ胆汁中に排泄されるため肝細胞相で肝実質は高信号となる。HCCは正常肝細胞を欠くため取り込まれず、肝細胞相で低信号（欠損）を示す。多血性のため動脈相では早期濃染する。"}, {"id": 29, "group": "画像・内視鏡・病理", "cat": "急性胆嚢炎", "type": "single", "ref": "急性胆嚢炎", "case": "68歳の女性。右季肋部痛と発熱を主訴に来院した。数時間前から持続する右季肋部痛が出現。体温37.9℃。眼球結膜に黄染を認めない。右季肋部に圧痛があり、吸気時に増強する。血液検査で白血球12,000、CRP 5.2mg/dL。総ビリルビンは正常。腹部超音波検査で胆嚢の腫大と壁肥厚、頸部に音響陰影を伴う高エコーを認める。", "q": "最も考えられる診断はどれか。", "choices": [["a", "胆嚢腺筋腫症"], ["b", "急性胆嚢炎"], ["c", "胆嚢癌"], ["d", "肝膿瘍"], ["e", "急性膵炎"]], "answer": ["b"], "expl": "胆嚢頸部（または胆嚢管）に嵌頓した胆石による胆汁うっ滞・細菌感染で急性胆嚢炎を来す。超音波が第一選択で、胆嚢腫大・壁肥厚・粘膜下浮腫・周囲脂肪への炎症波及、吸気時増強する圧痛（Murphy徴候）が特徴。総ビリルビン正常で黄疸を欠く点も胆管閉塞との鑑別点。音響陰影を伴う高エコーは胆石を示す。"}, {"id": 30, "group": "画像・内視鏡・病理", "cat": "総胆管結石・胆管炎", "type": "single", "ref": "cf.115D52", "case": "72歳の男性。腹痛と発熱を主訴に来院した。3日前から腹痛と発熱が出現。体温37.9℃。眼球結膜に黄染を認める。心窩部に軽度の圧痛を認める。総ビリルビン6.0mg/dL、直接ビリルビン4.7mg/dL、ALP・γ-GT高値、CRP 4.9mg/dL。腹部超音波検査で肝内胆管の拡張を認める。MRCPで総胆管の拡張と総胆管末端の結石を認める。", "q": "まず行うべき治療はどれか。", "choices": [["a", "腹腔鏡下胆嚢摘出術"], ["b", "経皮的エタノール注入療法"], ["c", "内視鏡的胆道ドレナージ"], ["d", "外来での経過観察"], ["e", "体外衝撃波結石破砕術〈ESWL〉"]], "answer": ["c"], "expl": "総胆管結石による閉塞性黄疸・急性胆管炎。MRCPは水を強調して胆管・膵管を非侵襲的に描出する。胆管炎では減黄・排膿目的の胆道ドレナージ（内視鏡的胆道ドレナージ＝ERCP経由のENBD/ステント、必要に応じ乳頭括約筋切開・採石）が優先される。胆嚢摘出は感染沈静化後に検討する。"}, {"id": 31, "group": "画像・内視鏡・病理", "cat": "膵胆管合流異常", "type": "multiple", "ref": "膵胆管合流異常・先天性胆道拡張症", "case": "", "q": "膵胆管合流異常（先天性胆道拡張症に合併）で発生リスクが高まる悪性腫瘍はどれか。2つ選べ。", "choices": [["a", "胆嚢癌"], ["b", "膵管内乳頭粘液性腫瘍〈IPMN〉"], ["c", "胆管癌"], ["d", "肝細胞癌"], ["e", "大腸癌"]], "answer": ["a", "c"], "expl": "膵胆管合流異常は主膵管と総胆管が十二指腸壁外で合流し1cm以上の長い共通管を形成する先天異常。膵液の胆道への逆流により胆道上皮の慢性炎症・化生を来し、胆嚢癌・胆管癌の高リスクとなる。先天性胆道拡張症（総胆管嚢腫）に合併しやすく、診断時は胆道癌の合併に注意する。"}, {"id": 32, "group": "画像・内視鏡・病理", "cat": "膵頭部癌", "type": "single", "ref": "cf.112D25", "case": "65歳の男性。皮膚黄染を主訴に来院した。眼球結膜に黄染を認める。総ビリルビンと直接ビリルビン、ALP、γ-GTが上昇。造影CTで膵頭部に境界不明瞭で造影効果に乏しい腫瘤を認め、主膵管と総胆管がともに拡張している。", "q": "最も考えられる診断はどれか。", "choices": [["a", "自己免疫性膵炎"], ["b", "膵頭部癌"], ["c", "分枝型IPMN"], ["d", "膵神経内分泌腫瘍"], ["e", "急性膵炎"]], "answer": ["b"], "expl": "膵頭部の境界不明瞭・乏血性（造影効果に乏しい）腫瘤で、主膵管と総胆管の両者が拡張する所見がdouble duct sign。膵頭部癌（あるいは胆管癌の膵浸潤）を強く疑う。膵管癌は乏血性で、境界明瞭・多血性の膵神経内分泌腫瘍とは対照的。質的診断には超音波内視鏡〈EUS〉やERCPが有用。"}, {"id": 33, "group": "画像・内視鏡・病理", "cat": "IPMN", "type": "single", "ref": "cf.113A9", "case": "", "q": "膵管内乳頭粘液性腫瘍〈IPMN〉で見られないのはどれか。", "choices": [["a", "Vater乳頭の開大"], ["b", "膵管内の乳頭状増生"], ["c", "主膵管のびまん性狭窄"], ["d", "膵管分枝のブドウの房状拡張"], ["e", "主膵管内のイクラ状隆起性病変"]], "answer": ["c"], "expl": "IPMNは膵管上皮の乳頭状増殖と粘液産生を特徴とし、粘液貯留により主膵管拡張・分枝の房状（ブドウの房状）拡張を来す。過剰な粘液排出でVater乳頭が開大し、乳頭からイクラ状（魚卵様）の隆起が見られることもある。主膵管の“びまん性狭窄”は慢性膵炎や自己免疫性膵炎的所見で、IPMNの特徴ではない。"}, {"id": 34, "group": "画像・内視鏡・病理", "cat": "IPMN（高リスク所見）", "type": "multiple", "ref": "IPMN", "case": "", "q": "IPMNにおいて外科的切除を検討すべき高リスク所見（high-risk stigmata）はどれか。2つ選べ。", "choices": [["a", "主膵管径10mm以上"], ["b", "造影効果を有する5mm以上の壁在結節"], ["c", "2cm大の単房性分枝拡張のみ"], ["d", "血清CEAが正常範囲"], ["e", "無症状で径5mmの分枝型病変"]], "answer": ["a", "b"], "expl": "IPMNでは主膵管径10mm以上、造影効果を有する5mm以上の壁在結節などが悪性を示唆する高リスク所見で、手術（Ope）を検討する。3cm以上の嚢胞などはEUSによる精査を要するworrisome feature。小径・単房性で結節や主膵管拡張を伴わない分枝型病変は経過観察が基本。"}, {"id": 35, "group": "肝臓", "cat": "自己免疫性肝炎", "type": "single", "ref": "自己免疫性肝疾患", "case": "58歳女性。倦怠感を主訴に受診。飲酒歴なし、常用薬なし。AST 320 IU/L、ALT 280 IU/L、血清IgG 2,800 mg/dL（高値）、抗核抗体160倍陽性。HBs抗原陰性、HCV抗体陰性。肝生検でinterface hepatitisと形質細胞浸潤を認めた。", "q": "第一に選択すべき治療はどれか。", "choices": [["a", "プレドニゾロン"], ["b", "エンテカビル"], ["c", "インターフェロン"], ["d", "瀉血"], ["e", "D-ペニシラミン"]], "answer": ["a"], "expl": "中年女性・抗核抗体陽性・IgG高値・interface hepatitis／形質細胞浸潤はいずれも自己免疫性肝炎（AIH）に典型的。ウイルス・アルコール・薬物性を除外したうえで、副腎皮質ステロイド（プレドニゾロン30〜40mg/日）が著効する。軽症例ではUDCA単独もあるが、この程度の活動性では第一選択はステロイド。"}, {"id": 36, "group": "肝臓", "cat": "原発性胆汁性胆管炎", "type": "multiple", "ref": "自己免疫性肝疾患", "case": "", "q": "原発性胆汁性胆管炎（PBC）について正しいのはどれか。2つ選べ。", "choices": [["a", "抗ミトコンドリア抗体（AMA）が陽性となる"], ["b", "若年男性に好発する"], ["c", "第一選択薬はウルソデオキシコール酸である"], ["d", "胆道系酵素は正常でALTのみが著明に上昇する"], ["e", "シェーグレン症候群は合併しにくい"]], "answer": ["a", "c"], "expl": "PBCは中年以降の女性に多い慢性進行性の胆汁うっ滞性肝疾患。AMA陽性とそう痒感が特徴で、ALP・GGTなど胆道系酵素が上昇する。治療の第一選択はUDCA（通常600mg、効果不十分なら900mgまで／効果不十分時にベザフィブラート併用）。慢性甲状腺炎・シェーグレン症候群・関節リウマチを合併しやすい。"}, {"id": 37, "group": "肝臓", "cat": "原発性硬化性胆管炎", "type": "single", "ref": "自己免疫性肝疾患", "case": "26歳男性。健診で肝胆道系酵素高値を指摘され受診。3年前から潰瘍性大腸炎で加療中。ALP・GGT上昇。MRCPで肝内外胆管にびまん性の数珠状（beaded appearance）狭窄と拡張を認める。肝生検で胆管周囲の同心円状（onion skin）線維化を認めた。", "q": "最も考えられる疾患はどれか。", "choices": [["a", "原発性硬化性胆管炎"], ["b", "原発性胆汁性胆管炎"], ["c", "自己免疫性肝炎"], ["d", "総胆管結石症"], ["e", "アルコール性肝硬変"]], "answer": ["a"], "expl": "若年〜中年男性、潰瘍性大腸炎の合併（約30%）、胆管の数珠状（beaded appearance）狭窄、onion skin様の同心円状線維化はいずれもPSCに特徴的。胆管癌を約7%に合併する。UDCAやステント治療が行われるが、長期予後を改善する唯一の治療は肝移植。"}, {"id": 38, "group": "肝臓", "cat": "薬物性肝障害", "type": "single", "ref": "薬物性肝障害", "case": "22歳女性。自殺企図でアセトアミノフェンを大量服用。翌日から嘔気と右季肋部痛が出現。AST 4,500 IU/L、ALT 5,200 IU/L、プロトロンビン時間延長を認める。", "q": "この肝障害について正しいのはどれか。", "choices": [["a", "投与量に比例して生じる中毒性肝障害である"], ["b", "薬剤アレルギーによる特異体質性の機序が主体である"], ["c", "末梢血好酸球増加が診断に必須である"], ["d", "皮疹や発熱を高頻度に伴う"], ["e", "予知が可能でありあらかじめ回避できる"]], "answer": ["a"], "expl": "アセトアミノフェンは肝毒性をもつ代謝産物により投与量に比例して肝障害を起こす中毒性（用量依存性）薬物性肝障害の代表。成人で7〜10gで中毒、15gで劇症化、25gで致死量。発熱・発疹・好酸球増加を伴い予知困難なのはアレルギー性（特異体質性）肝障害。"}, {"id": 39, "group": "肝臓", "cat": "薬物性肝障害", "type": "multiple", "ref": "薬物性肝障害", "case": "", "q": "アレルギー性（特異体質性）薬物性肝障害を示唆する所見はどれか。2つ選べ。", "choices": [["a", "薬剤服用開始1〜4週後の肝機能障害の出現"], ["b", "末梢血好酸球増加（6%以上）"], ["c", "投与量に厳密に比例した重症度"], ["d", "発症までに通常1年以上を要する"], ["e", "薬剤を中止しても肝障害が改善しない"]], "answer": ["a", "b"], "expl": "アレルギー性薬物性肝障害は服用開始1〜4週で発症し、発熱・発疹・皮膚掻痒・黄疸などの初発症状や末梢血好酸球増加（6%以上）・白血球増加を伴う。投与量に依存せず予知困難で、被疑薬中止により一般に改善する。用量依存は中毒性の特徴。"}, {"id": 40, "group": "肝臓", "cat": "代謝性肝疾患", "type": "single", "ref": "代謝性肝疾患（脂肪性肝疾患）", "case": "", "q": "脂肪性肝疾患に関する記述で正しいのはどれか。", "choices": [["a", "単純性脂肪肝（MASLD）ではAST/ALT比は通常1未満である"], ["b", "MASHは腹部超音波で確定診断できる"], ["c", "MASHは肝硬変・肝癌へ移行しない"], ["d", "非アルコール性の基準は男性でエタノール60g/日以下である"], ["e", "アルコール性肝障害ではALPが著明に上昇しGGTは低下する"]], "answer": ["a"], "expl": "単純性脂肪肝（MASLD）は自覚症状なく可逆的で、AST/ALT比は通常1未満。炎症・線維化を伴い進行性で予後不良な型がMASHで、画像では診断不能・確定は肝生検のみ、肝硬変・肝癌へ進展しうる（5年で約10〜15%発癌）。非アルコール性の基準はエタノール換算で男性30g/日以下・女性20g/日以下。"}, {"id": 41, "group": "肝臓", "cat": "代謝性肝疾患", "type": "single", "ref": "代謝性肝疾患（アルコール性肝障害）", "case": "52歳男性。日本酒5合/日を20年間継続。倦怠感を主訴に受診。AST 180 IU/L、ALT 70 IU/L、GGT 620 IU/L、ALPは軽度上昇。肝腫大を認める。", "q": "この病態について正しいのはどれか。", "choices": [["a", "AST/ALT比が1以上である"], ["b", "GGTは正常でALPが著明に上昇する"], ["c", "女性は男性より多量の飲酒で初めて肝硬変に至る"], ["d", "診断にはHCV抗体陽性が必要である"], ["e", "抗ミトコンドリア抗体が陽性となる"]], "answer": ["a"], "expl": "アルコール性肝障害ではAST/ALT比が1以上（AST＞ALT）の肝細胞障害を呈し、GGTが高値でALPはあまり上昇しない。肝は腫大（特に右葉）。女性は男性より少ない飲酒量で肝硬変へ移行する。抗ミトコンドリア抗体陽性はPBCの所見。"}, {"id": 42, "group": "肝臓", "cat": "代謝性肝疾患", "type": "single", "ref": "代謝性肝疾患（ウィルソン病）", "case": "19歳男性。手のふるえと構音障害が出現。肝機能障害を指摘された。血清セルロプラスミン低値、血清銅低下、尿中銅排泄増加を認め、細隙灯検査で角膜輪（Kayser-Fleischer輪）を認めた。", "q": "治療として適切なのはどれか。", "choices": [["a", "D-ペニシラミン"], ["b", "デフェロキサミン"], ["c", "瀉血"], ["d", "プレドニゾロン"], ["e", "エンテカビル"]], "answer": ["a"], "expl": "先天性銅代謝異常（常染色体劣性遺伝）のウィルソン病。肝硬変・錐体外路症状（振戦・構音障害）・Kayser-Fleischer角膜輪が3徴。銅がセルロプラスミンと結合できずアルブミンと緩く結合して組織沈着・尿中排泄増加を来す。治療は銅キレート剤D-ペニシラミン。デフェロキサミンは鉄キレート剤でヘモクロマトーシス用。"}, {"id": 43, "group": "胆・膵", "cat": "胆膵系解剖", "type": "single", "ref": "胆膵解剖", "case": "", "q": "胆膵系の正常解剖と生理について正しいのはどれか。", "choices": [["a", "十二指腸主乳頭は十二指腸球部に開口する"], ["b", "副乳頭にはOddi括約筋が存在する"], ["c", "胆汁は胆嚢管を通って胆嚢内に一時貯留・濃縮される"], ["d", "食事を摂ると胆嚢は弛緩し胆汁貯留が進む"], ["e", "副乳頭は主膵管の開口部である"]], "answer": ["c"], "expl": "胆汁は肝内・肝外胆管を経て、一部が胆嚢管を通り胆嚢内で一時貯留・濃縮される（c正）。主乳頭・副乳頭はいずれも十二指腸下行部に存在する（a誤）。副乳頭は副膵管の開口部で括約筋を持たない（b・e誤）。食事で胆嚢は収縮し、Oddi括約筋が弛緩して胆汁が排出される（d誤）。"}, {"id": 44, "group": "胆・膵", "cat": "膵臓解剖", "type": "multiple", "ref": "膵臓の区分", "case": "", "q": "膵臓の区分・解剖について正しいものを2つ選べ。", "choices": [["a", "膵頭部と膵体部の境界は上腸間膜静脈（SMV）・門脈（PV）の左側縁である"], ["b", "膵体部と膵尾部の境界は大動脈の左側縁である"], ["c", "膵鉤部は膵尾部に属する部分である"], ["d", "膵尾部癌は膵頭部癌より閉塞性黄疸を来しやすい"], ["e", "膵液を分泌するランゲルハンス島が膵管につながっている"]], "answer": ["a", "b"], "expl": "膵頭部/体部の境界はSMV・門脈の左側縁（a正）、体部/尾部の境界は大動脈の左側縁（b正）。膵鉤部は大動脈とSMVに挟まれた膵頭部の一部である（c誤）。膵尾部癌は遠位胆管に関与せず黄疸を来しにくい（d誤）。膵液は腺房細胞から膵管へ、ランゲルハンス島はホルモンを血中へ分泌する内分泌組織である（e誤）。"}, {"id": 45, "group": "胆・膵", "cat": "急性胆管炎", "type": "single", "ref": "114D46", "case": "89歳女性。腹痛と発熱のため救急搬入。5日前から上腹部鈍痛と食欲不振があり、今朝から発熱。意識レベルJCS I-2、体温38.8℃、心拍数108/分、血圧94/60mmHg、呼吸数24/分、SpO2 96%（酸素3L/分）。眼球結膜に軽度黄染、右季肋部に軽度圧痛。白血球13,600、血小板20万、総ビリルビン4.1mg/dL、直接ビリルビン3.2mg/dL、AST 889、ALT 459、ALP 1,299（基準115〜359）、γ-GT 188、CRP 7.1mg/dL。", "q": "最も考えられるのはどれか。", "choices": [["a", "急性肝炎"], ["b", "胆石胆嚢炎"], ["c", "汎発性腹膜炎"], ["d", "Mirizzi症候群"], ["e", "急性閉塞性化膿性胆管炎"]], "answer": ["e"], "expl": "腹痛・発熱・黄疸のCharcot 3徴に加え、血圧低下（ショック）・意識障害（JCS I-2）を伴うReynolds 5徴を呈しており、急性閉塞性化膿性胆管炎（e）が最も考えられる。胆道系酵素（ALP・γ-GT）とビリルビン上昇に加えAST/ALT上昇、著明な炎症反応を伴う。敗血症・DICに進展する国試頻出の緊急病態で、抗菌薬とショック対策に加え早急な胆管ドレナージを要する。"}, {"id": 46, "group": "胆・膵", "cat": "急性胆嚢炎", "type": "single", "ref": "胆道感染症", "case": "", "q": "急性胆嚢炎について正しいのはどれか。", "choices": [["a", "血清総ビリルビンが著明に上昇するのが典型的である"], ["b", "炎症反応（WBC・CRP）の上昇はまれである"], ["c", "腹部超音波で胆嚢腫大と壁肥厚（3層構造）を認める"], ["d", "起因菌はグラム陽性球菌が最も多い"], ["e", "初期治療の第一選択は膵頭十二指腸切除術である"]], "answer": ["c"], "expl": "急性胆嚢炎では胆嚢腫大・壁肥厚（3層構造）が超音波の特徴的所見（c正）。胆嚢炎単独ではAST/ALT/ALP/T-BILの上昇は乏しく（a誤）、炎症反応は必ず上昇する（b誤）。起因菌はグラム陰性桿菌（大腸菌30〜40%、クレブシエラ、緑膿菌）が中心（d誤）。治療は抗菌薬・ドレナージ・外科的胆嚢摘出術であり、膵頭十二指腸切除は適応外（e誤）。"}, {"id": 47, "group": "胆・膵", "cat": "胆管結石", "type": "single", "ref": "胆石症", "case": "", "q": "総胆管結石に対する治療の第一選択はどれか。", "choices": [["a", "経過観察"], ["b", "内視鏡的乳頭括約筋切開術（EST）＋バスケット・バルーンによる結石除去"], ["c", "開腹による胆管切石術"], ["d", "体外衝撃波結石破砕術のみ"], ["e", "利胆薬による溶解療法のみ"]], "answer": ["b"], "expl": "総胆管結石の第一選択は内視鏡的治療で、EST（またはEPBD:内視鏡的乳頭バルーン拡張術）で乳頭開口部を開大し、バスケットカテーテルやバルーンカテーテルで結石を除去する（b正）。胆管結石は急性胆管炎・膵炎の原因となりうるため、開腹手術（c）は第一選択ではなく、経過観察や溶解療法単独（a・e）は不適。"}, {"id": 48, "group": "胆・膵", "cat": "膵胆管合流異常", "type": "single", "ref": "先天性総胆管拡張症", "case": "", "q": "先天性総胆管拡張症・膵胆管合流異常症について正しいのはどれか。", "choices": [["a", "胆道癌（胆嚢癌・胆管癌）の発生リスクが高い"], ["b", "膵管と胆管は十二指腸壁内で正常に合流する"], ["c", "無症状であれば経過観察が治療の原則である"], ["d", "治療の第一選択は内視鏡的乳頭括約筋切開術である"], ["e", "膵液と胆汁の相互逆流は起こらない"]], "answer": ["a"], "expl": "膵胆管合流異常症は胆管と膵管が十二指腸壁外（Oddi括約筋外）で合流する先天異常で、膵液・胆汁の相互逆流が生じ（e誤）、胆道癌の高リスク病態である（a正）。しばしば先天性総胆管拡張症を伴う。合流部が壁内でない点でb誤。癌リスクのため、無症状でも治療は外科手術（分流・胆嚢および拡張胆管切除）が原則であり、経過観察や内視鏡治療単独ではない（c・d誤）。"}, {"id": 49, "group": "胆・膵", "cat": "胆膵内視鏡", "type": "multiple", "ref": "ERCP・EUS", "case": "", "q": "胆膵に対する内視鏡診療について正しいものを2つ選べ。", "choices": [["a", "ERCPの合併症として急性膵炎・出血・消化管穿孔がある"], ["b", "EUS-FNA（超音波内視鏡下穿刺生検）は膵病変の病理診断に用いられる"], ["c", "ERCPは造影による診断のみで、治療手技は行えない"], ["d", "ESTは乳頭開口部を縫合閉鎖する手技である"], ["e", "EUSでは膵臓や胆道を経消化管的に観察できない"]], "answer": ["a", "b"], "expl": "ERCPは十二指腸乳頭からカテーテルを挿入し膵管・胆管を造影する手技で、結石除去やステント留置など治療的ERCPも行い（c誤）、合併症に急性膵炎・出血・穿孔がある（a正）。EUSは超音波振動子付き内視鏡で膵・胆道を経消化管的に精査でき（e誤）、EUS-FNAで病変を穿刺し病理診断が可能（b正）。ESTは乳頭開口部を電気メスで切開する手技で縫合閉鎖ではない（d誤）。"}, {"id": 50, "group": "胆・膵", "cat": "閉塞性黄疸", "type": "multiple", "ref": "113D69", "case": "62歳男性。腹部膨満感と褐色尿を主訴に来院。1か月前から腹部膨満感と尿の濃染を自覚。飲酒は機会飲酒、薬剤服用なし。眼球結膜に黄染なし。総ビリルビン1.3mg/dL、直接ビリルビン0.9mg/dL、AST 98、ALT 106、ALP 492（基準115〜359）、γ-GTP 92、アミラーゼ58、CRP 1.1mg/dL。腹部超音波で異常を認めない。上部消化管内視鏡で十二指腸主乳頭部に腫瘤性病変を認めた。", "q": "まず行うべきなのはどれか。2つ選べ。", "choices": [["a", "生検"], ["b", "利胆薬投与"], ["c", "内視鏡的乳頭括約筋切開術"], ["d", "経皮的胆道ドレナージ"], ["e", "磁気共鳴胆管膵管撮像（MRCP）"]], "answer": ["a", "e"], "expl": "胆道系酵素（ALP・γ-GTP）優位の上昇と乳頭部の腫瘤から乳頭部癌が疑われる。乳頭は内視鏡下に直接観察できるため、まず生検で組織診断を行い（a）、MRCPで胆管・膵管の進展や拡張を非侵襲的に評価する（e）。診断確定前の乳頭切開（c）や、閉塞・胆管炎所見に乏しい現時点でのドレナージ（d）は先行せず、利胆薬（b）は原因治療にならない。"}, {"id": 51, "group": "胆・膵", "cat": "急性膵炎", "type": "single", "ref": "cf.112D51", "case": "65歳男性。飲酒後の悪心と上腹部痛を主訴に来院。身長165cm、体重90kg。体温37.5℃、脈拍112/分・整、血圧108/60mmHg。腹部は平坦で上腹部に圧痛を認める。血液生化学所見：総ビリルビン0.8mg/dL、AST35U/L、ALT30U/L、アミラーゼ2,540U/L（基準37〜160）、尿素窒素19mg/dL、クレアチニン0.9mg/dL。腹部超音波検査を行ったが、消化管ガスのため上腹部の観察が困難であった。", "q": "次に行うべき検査はどれか。", "choices": [["a", "血管造影"], ["b", "腹部造影CT"], ["c", "上部消化管造影"], ["d", "上部消化管内視鏡検査"], ["e", "内視鏡的逆行性胆管膵管造影〈ERCP〉"]], "answer": ["b"], "expl": "臨床所見と著明なアミラーゼ高値から急性膵炎が疑われる。膵の壊死範囲・重症度評価や成因検索には造影CTが最も重要で、壊死性膵炎では膵実質の造影不良を示す。超音波はガスで描出困難なため造影CTが次の一手。ERCPはこの時点では不要で、むしろ膵炎を増悪させうる。"}, {"id": 52, "group": "胆・膵", "cat": "急性膵炎", "type": "multiple", "ref": "cf.114D14", "case": "", "q": "急性膵炎の重症度判定基準の予後因子に含まれるものはどれか。2つ選べ。", "choices": [["a", "CRP"], ["b", "PaCO2"], ["c", "尿素窒素〈BUN〉"], ["d", "リパーゼ"], ["e", "トリプシン"]], "answer": ["a", "c"], "expl": "厚労省の急性膵炎重症度判定基準の予後因子9項目は、Base Excess/ショック、PaO2/呼吸不全、BUN/乏尿、LDH、血小板数、総Ca、CRP、SIRS該当項目数、年齢。CRPとBUNは含まれる。ガス分析はPaO2でありPaCO2ではない。リパーゼ・トリプシンなどの膵酵素値は重症度スコアには含まれない点が要注意。"}, {"id": 53, "group": "胆・膵", "cat": "急性膵炎", "type": "single", "ref": "cf.108I75", "case": "65歳男性。総胆管結石の加療目的で入院中。内視鏡的結石除去術（ERCP）施行の3時間後から持続性の心窩部痛と背部痛を訴えた。体温35.8℃、脈拍100/分・整、血圧84/56mmHg、SpO2 93%（room air）、顔面蒼白。腹部は平坦で心窩部に圧痛と筋性防御を認める。血液生化学所見：総ビリルビン1.2mg/dL、AST20U/L、ALT19U/L、ALP246U/L、アミラーゼ1,495U/L（基準37〜160）、クレアチニン1.0mg/dL、CRP0.1mg/dL。", "q": "この患者に起こっていると考えられる病態はどれか。", "choices": [["a", "術後出血"], ["b", "消化管穿孔"], ["c", "ERCP後急性膵炎"], ["d", "急性胆管炎"], ["e", "急性心筋梗塞"]], "answer": ["c"], "expl": "ERCP施行後数時間で発症した持続する心窩部痛・背部痛とアミラーゼ著明高値は、医原性のERCP後急性膵炎の典型像。膵管造影による膵管内圧上昇や膵傷害が機序。ビリルビン正常・CRP陰性で胆管炎は否定的。血圧低下は膵炎に伴う循環不全を反映する。"}, {"id": 54, "group": "胆・膵", "cat": "急性膵炎の合併症", "type": "single", "ref": "cf.118回", "case": "67歳女性。発熱と腹痛を主訴に転院した。4週間前から重症急性膵炎の診断で入院し、絶食・大量輸液・蛋白分解酵素阻害薬で改善したが、5日前から発熱と腹痛が出現し抗菌薬投与でも改善しない。体温37.6℃、心拍数84/分・整、血圧128/80mmHg。心窩部に圧痛を認めるが反跳痛や筋性防御はない。血液所見：白血球11,100。血液生化学所見：アルブミン2.9g/dL、アミラーゼ58U/L（基準44〜132）、CRP17mg/dL。", "q": "診断はどれか。", "choices": [["a", "慢性膵炎"], ["b", "膵仮性囊胞"], ["c", "膵・胆管合流異常症"], ["d", "被包化膵壊死〈WON〉"], ["e", "膵管内乳頭粘液性腫瘍〈IPMN〉"]], "answer": ["d"], "expl": "重症急性膵炎の発症約4週間後に、膵および膵周囲の液状化壊死組織が被膜に包まれた歪な多房性嚢胞様構造を呈するのが被包化膵壊死〈WON〉。感染を伴うと発熱・炎症反応上昇をきたし、抗菌薬に反応しない場合は経消化管的・経乳頭的ドレナージの適応となる。仮性嚢胞は壊死組織を含まない点で区別する。"}, {"id": 55, "group": "胆・膵", "cat": "慢性膵炎", "type": "single", "ref": "cf.119A58", "case": "54歳男性。下痢を主訴に来院。2か月前から1日6〜7回の泥状〜水様便が続き、揚げ物を食べると脂肪便を認める。便に血液の付着はない。日本酒6合/日を34年間。身長174cm、体重58kg。腹部は平坦・軟で圧痛なく、腸雑音はやや亢進。血液生化学所見：アミラーゼ28U/L（基準44〜132）、空腹時血糖140mg/dL、CEA3.0ng/mL、CA19-9 37U/mL。画像で膵石を認める。", "q": "禁酒指導に加え、この患者に対する対応として最も適切なのはどれか。", "choices": [["a", "低脂肪食の徹底"], ["b", "利胆剤の投与"], ["c", "消化酵素の補充"], ["d", "酸分泌抑制剤の投与"], ["e", "体外衝撃波結石破砕術〈ESWL〉"]], "answer": ["c"], "expl": "長期多飲・膵石・アミラーゼ低値・脂肪便・耐糖能異常から慢性膵炎非代償期。膵外分泌機能不全による消化吸収障害が主体で、膵酵素（消化酵素）補充療法により脂肪喪失を防ぐのが原則。この時期は脂肪を過度に制限せず40g以上摂取のうえ酵素補充する。ESWLは疼痛を伴う膵石が原因の場合の選択肢で、本例の主病態ではない。"}, {"id": 56, "group": "胆・膵", "cat": "慢性膵炎", "type": "multiple", "ref": "cf.112A73改変", "case": "62歳男性。1年ほど前から時々背部痛を自覚していたが、この数か月はほとんど痛みを感じない。2か月前から食後に下痢をするようになり来院。最近口渇を強く感じる。25歳ごろからアルコールを多飲し、現在も連日日本酒2合以上。上腹部に圧痛なし。血液生化学所見：アミラーゼ30U/L（基準37〜160）、CA19-9 32U/mL。CT・MRCPで膵内石灰化を認める。", "q": "この患者で想定される検査値はどれか。3つ選べ。", "choices": [["a", "HbA1c 9.6%（基準4.6〜6.2）"], ["b", "アルブミン 3.5g/dL（基準4.0〜5.0）"], ["c", "総コレステロール 120mg/dL（基準130〜220）"], ["d", "総ビリルビン 8.2mg/dL"], ["e", "白血球 15,300"]], "answer": ["a", "b", "c"], "expl": "慢性膵炎非代償期では膵内分泌不全による糖代謝障害（HbA1c高値）と、膵外分泌不全による消化吸収障害・栄養障害（アルブミン低下、総コレステロール低下）をきたす。膵性糖尿病を反映しHbA1cは高値。閉塞性黄疸を示唆する著明なビリルビン高値や、感染を示す白血球著増はこの病態では想定されない。"}, {"id": 57, "group": "胆・膵", "cat": "自己免疫性膵炎", "type": "single", "ref": "cf.105D25", "case": "76歳男性。黄疸を主訴に来院。3日前に家族に皮膚の黄染を指摘された。3年前に唾液腺腫瘤を摘出。飲酒は機会飲酒。眼球結膜に黄染を認め、腹痛は軽度。血液生化学所見：血糖201mg/dL、HbA1c6.7%、総ビリルビン6.8mg/dL、AST86U/L、ALT78U/L、ALP1,230U/L。免疫学所見：抗核抗体陽性、IgG3,890mg/dL（基準739〜1,649）、CEA2.8ng/mL、CA19-9 26U/mL。造影CTで膵のびまん性腫大、ERCPで主膵管のびまん性狭細像を認める。", "q": "最も考えられる診断はどれか。", "choices": [["a", "膵管癌"], ["b", "自己免疫性膵炎"], ["c", "アルコール性慢性膵炎"], ["d", "急性胆石性膵炎"], ["e", "原発性硬化性胆管炎"]], "answer": ["b"], "expl": "中高年男性、無痛性〜軽度腹痛の閉塞性黄疸、IgG著明高値、既往の唾液腺腫瘤（IgG4関連疾患）、膵びまん性腫大（ソーセージ様）と主膵管のびまん性狭細像は自己免疫性膵炎の典型像。発症に伴い糖尿病が悪化する点も合致。ステロイドに良好に反応し予後は比較的良好。膵管癌は限局性腫瘤と尾側膵管拡張を示す点で異なる。"}, {"id": 58, "group": "胆・膵", "cat": "急性膵炎の身体所見", "type": "single", "ref": "急性膵炎の徴候", "case": "", "q": "重症急性膵炎で、血性滲出液が左側腹部の皮下に沈着して生じる皮膚変色を示す徴候はどれか。", "choices": [["a", "Cullen徴候"], ["b", "Grey-Turner徴候"], ["c", "Murphy徴候"], ["d", "colon cut-off sign"], ["e", "sentinel loop sign"]], "answer": ["b"], "expl": "膵液による組織の自己融解に伴う出血が左側腹部の皮下に及ぶとGrey-Turner徴候（側腹部の変色）、臍周囲に及ぶとCullen徴候となり、いずれも重症急性膵炎を示唆する。colon cut-off signとsentinel loop signは腹部単純X線での腸管ガス所見。Murphy徴候は急性胆嚢炎の所見で膵炎とは関連しない。"}, {"id": 59, "group": "肝臓", "cat": "肝区域解剖", "type": "single", "ref": "肝外科解剖", "case": "", "q": "肝の区域解剖について正しいのはどれか。", "choices": [["a", "肝区域は肝静脈の分岐形態に基づいて命名される"], ["b", "各区域の境界には必ず肝静脈が走行する"], ["c", "S1(尾状葉)は肝門板の腹側領域を指す"], ["d", "肝への流入血流は肝動脈が約70%を占める"], ["e", "門脈枝(Glisson)を離断すると鬱血域が生じる"]], "answer": ["b"], "expl": "肝区域は門脈枝(Glisson)の分岐に基づき命名され(葉・区域・亜区域)、各区域境界には必ず肝静脈が走行する(b正)。aは門脈枝が正。S1尾状葉は肝門板の背側領域(c誤)。流入血流は門脈70%・肝動脈30%(d誤)。Glisson離断で阻血域、肝静脈切離で鬱血域が生じる(e誤)。"}, {"id": 60, "group": "肝臓", "cat": "肝予備能・肝切除", "type": "single", "ref": "肝切除・肝予備能", "case": "60歳男性。C型肝硬変を背景にS8に4cmの肝細胞癌を認め肝切除を予定。Child-Pugh A、腹水なし。ICG15分値(ICGR15)は15%であった。", "q": "この症例で肝切除を安全に行うために確保すべき残肝容積の目安はどれか。", "choices": [["a", "残肝容積20%以上"], ["b", "残肝容積30%以上"], ["c", "残肝容積40%以上"], ["d", "残肝容積60%以上"], ["e", "残肝容積を考慮する必要はない"]], "answer": ["d"], "expl": "ICGR15を用いた切除可能量の目安として、ICGR15<10%なら残肝容積40%、ICGR15が10〜20%なら残肝容積60%の確保が必要とされる。本例はICGR15=15%であり60%を確保する必要がある(d正)。基準を満たさない場合は門脈塞栓術などで残肝肥大を図る。"}, {"id": 61, "group": "肝臓", "cat": "門脈塞栓術", "type": "single", "ref": "門脈塞栓術(PVE/TIPE)", "case": "", "q": "大量肝切除に先立って行う門脈塞栓術(PVE、経回腸的門脈枝塞栓術TIPEを含む)の主目的として正しいのはどれか。", "choices": [["a", "腫瘍への血流を遮断して腫瘍を壊死させる"], ["b", "塞栓した側と対側(残肝予定領域)の代償性肥大を促し残肝容積を増やす"], ["c", "肝動脈からの出血を予防する"], ["d", "門脈圧を低下させ食道静脈瘤破裂を予防する"], ["e", "肝細胞癌の脈管侵襲を診断する"]], "answer": ["b"], "expl": "PVE/TIPEは切除予定側の門脈枝を塞栓し、残肝予定領域(非塞栓側)の代償性肥大を誘導して残肝容積・予備能を高め、術後肝不全を回避する目的で行う(b正)。腫瘍壊死目的はTACE。呈示データでも塞栓後に残肝容積が30.9%→53.0%へ増大している。"}, {"id": 62, "group": "肝臓", "cat": "肝移植・手術手技", "type": "single", "ref": "肝移植", "case": "", "q": "同所性肝移植におけるレシピエントの血管・胆管再建(吻合)の順序として正しいのはどれか。", "choices": [["a", "肝動脈→門脈→肝静脈→胆管"], ["b", "門脈→肝静脈→肝動脈→胆管"], ["c", "肝静脈→門脈→肝動脈→胆管"], ["d", "胆管→肝動脈→門脈→肝静脈"], ["e", "肝静脈→肝動脈→門脈→胆管"]], "answer": ["c"], "expl": "同所性肝移植の再建順序は肝静脈→門脈→肝動脈→胆管である(c正)。まずレシピエント肝を全摘し血管・胆管を長く残してグラフトを移植する。術後は門脈・肝動脈血栓症が致命的となるため抗凝固療法を行い、胆管狭窄は『移植のアキレス腱』とされる。"}, {"id": 63, "group": "肝臓", "cat": "肝移植・適応", "type": "multiple", "ref": "HCCに対する肝移植", "case": "", "q": "本邦における肝細胞癌(HCC)に対する肝移植の保険適応について正しいものを2つ選べ。", "choices": [["a", "ミラノ基準(単発5cm以下、または3cm以下3個以内)が適応基準に含まれる"], ["b", "AFPを含む5-5-500基準も保険適応となっている"], ["c", "肉眼的脈管侵襲を認めても適応となる"], ["d", "肝外病変があっても腫瘍径が小さければ適応となる"], ["e", "肝機能が良好に保たれている段階を最優先の適応とする"]], "answer": ["a", "b"], "expl": "HCCに対する肝移植の保険適応はミラノ基準(単発5cm以下or3cm以下3個以内)と、AFPを加味した5-5-500基準である(a・b正)。肉眼的脈管侵襲や肝外病変は移植の禁忌条件(c・d誤)。肝機能が保たれる間は切除やTACEなど他治療が優先され、Child C→Bへ適応拡大された(e誤)。"}, {"id": 64, "group": "肝臓", "cat": "転移性肝癌", "type": "multiple", "ref": "転移性肝癌", "case": "", "q": "肝切除の意義が認められている転移性肝癌の原発巣として適切なものを2つ選べ。", "choices": [["a", "大腸癌"], ["b", "神経内分泌腫瘍(NEN)"], ["c", "膵癌"], ["d", "胆道癌"], ["e", "原発不明癌"]], "answer": ["a", "b"], "expl": "転移性肝癌で肝切除の意義が認められるのは大腸癌・婦人科系腫瘍・神経内分泌腫瘍(NEN)・胃癌や乳癌の一部などである(a・b正)。最もエビデンスが集積するのは大腸癌肝転移で、薬物療法奏効例ではconversion surgeryも行う。膵癌・胆道癌の肝転移に対する切除意義は乏しい(c・d誤)。"}, {"id": 65, "group": "肝臓", "cat": "肝内胆管癌", "type": "single", "ref": "ICC 画像診断・鑑別", "case": "68歳男性。B型・C型肝炎ともに陰性。肝S6に境界やや不明瞭な腫瘤を認め、末梢側の胆管拡張を伴う。造影ダイナミックCTでは単純相・動脈相・平衡相を通じて低吸収(low-low-lowパターン)を示す。CEA・CA19-9が上昇し、AFP・PIVKA-IIは正常。", "q": "最も考えられる診断はどれか。", "choices": [["a", "肝細胞癌(HCC)"], ["b", "肝内胆管癌(ICC)"], ["c", "肝血管腫"], ["d", "限局性結節性過形成(FNH)"], ["e", "肝嚢胞"]], "answer": ["b"], "expl": "ICCはほとんどが腺癌で、腫瘍マーカーはCEA・CA19-9、造影CTでlow-low-lowパターン(動脈相で濃染しない)、末梢胆管拡張を伴う(b正)。HCCはAFP/PIVKA-II上昇でlow-high-low(動脈相濃染→washout)を示す(a誤)。本例はnonBnonCで腫瘍マーカー・造影所見がICCに合致する。"}, {"id": 66, "group": "肝臓", "cat": "HCC薬物療法", "type": "multiple", "ref": "HCCに対する薬物療法", "case": "", "q": "進行肝細胞癌の一次治療で用いられる、免疫チェックポイント阻害薬を含むレジメンを2つ選べ。", "choices": [["a", "アテゾリズマブ(抗PD-L1抗体)＋ベバシズマブ"], ["b", "デュルバルマブ(抗PD-L1抗体)＋トレメリムマブ(抗CTLA-4抗体)"], ["c", "レゴラフェニブ単剤"], ["d", "ラムシルマブ単剤"], ["e", "カボザンチニブ単剤"]], "answer": ["a", "b"], "expl": "免疫チェックポイント阻害薬を含む一次治療レジメンはアテゾリズマブ+ベバシズマブ(IMbrave150)とデュルバルマブ+トレメリムマブである(a・b正)。免疫チェックポイント阻害薬はCTLA-4やPD-1/PD-L1経路を阻害しがん免疫を活性化する。レゴラフェニブ・ラムシルマブ・カボザンチニブはいずれも二次治療の分子標的薬(c・d・e誤)。"}, {"id": 67, "group": "画像・内視鏡・病理", "cat": "胃癌", "type": "multiple", "ref": "胃癌のリスク因子", "case": "", "q": "胃癌のリスク因子として適切なものを2つ選べ。", "choices": [["a", "Helicobacter pylori 感染"], ["b", "高塩分食"], ["c", "習慣的な飲酒"], ["d", "ヨード欠乏"], ["e", "アスピリンの長期内服"]], "answer": ["a", "b"], "expl": "本邦の胃癌の95%以上にH. pylori感染が関与する。高塩分食・喫煙・ニトロソアミン（焦げ・ハム・ソーセージ）もリスク因子。飲酒・喫煙は食道扁平上皮癌の2大リスクであり胃癌の主因ではない。アスピリンはむしろ大腸ポリープの抑制因子である。"}, {"id": 68, "group": "画像・内視鏡・病理", "cat": "早期胃癌", "type": "single", "ref": "早期胃癌の定義", "case": "", "q": "早期胃癌の定義として正しいのはどれか。", "choices": [["a", "癌が粘膜内にとどまり、かつリンパ節転移がないもの"], ["b", "癌が粘膜下層までにとどまるもの（リンパ節転移の有無は問わない）"], ["c", "癌が固有筋層までにとどまるもの"], ["d", "腫瘍径が2cm以下のもの"], ["e", "遠隔転移を認めないもの"]], "answer": ["b"], "expl": "早期胃癌は深達度が粘膜下層(SM)までにとどまる癌で、リンパ節転移の有無は問わない。腫瘍径や転移の有無ではなく深達度のみで定義される点が重要。早期食道癌・早期大腸癌も同義である。"}, {"id": 69, "group": "画像・内視鏡・病理", "cat": "胃癌・内視鏡治療", "type": "single", "ref": "早期胃癌ESD/EMRの適応", "case": "68歳男性。検診の上部消化管内視鏡で胃前庭部に25mm大の0-IIa病変を認めた。生検はtub1（高分化型腺癌）。潰瘍（瘢痕）所見はなく、超音波内視鏡・生検所見から深達度は肉眼的粘膜内癌 cT1a(M) と診断された。", "q": "最も適切な治療はどれか。", "choices": [["a", "経過観察"], ["b", "内視鏡的粘膜下層剥離術（ESD）"], ["c", "幽門側胃切除＋リンパ節郭清"], ["d", "全身化学療法"], ["e", "胃全摘術"]], "answer": ["b"], "expl": "分化型・cT1a(M)・UL0で腫瘍径2cm超は絶対適応病変であり、一括切除が可能なESDが選択される。EMRは2cm以下が目安のため大型病変には不向き。リンパ節転移リスクがほぼなく郭清を伴う外科切除は不要である。"}, {"id": 70, "group": "画像・内視鏡・病理", "cat": "胃癌・根治性評価", "type": "single", "ref": "早期胃癌ESD/EMR後の根治性の評価", "case": "早期胃癌に対しESDを施行し一括切除した。最終病理は分化型腺癌、深達度 pT1b(SM2)（粘膜筋板から500μm以深）、水平・垂直断端陰性、脈管侵襲なし。患者は70歳で全身状態は良好である。", "q": "内視鏡根治度の評価と次に推奨される方針として適切なものはどれか。", "choices": [["a", "eCuraA、追加治療は不要"], ["b", "eCuraC-1、再度のESD"], ["c", "eCuraC-2、追加の外科的胃切除＋リンパ節郭清"], ["d", "根治しており経過観察のみ"], ["e", "化学放射線療法"]], "answer": ["c"], "expl": "SM2（500μm以深）浸潤はリンパ節転移リスクが高く、断端陰性でもeCuraA基準を満たさずeCuraC-2に相当する。標準治療は追加の外科的胃切除＋リンパ節郭清。高齢・重度併存症で手術困難な場合のみ、想定転移リスクを勘案し患者と相談する。"}, {"id": 71, "group": "画像・内視鏡・病理", "cat": "食道癌", "type": "single", "ref": "食道扁平上皮癌", "case": "", "q": "本邦の食道癌について誤っているのはどれか。", "choices": [["a", "組織型は扁平上皮癌が約95%を占める"], ["b", "飲酒・喫煙が2大発癌リスク因子である"], ["c", "好発部位は胸部中部食道（Mt）が最も多い"], ["d", "アルデヒド脱水素酵素2（ALDH2）活性が高い人でリスクが高い"], ["e", "頭頸部などの重複癌を合併しやすい"]], "answer": ["d"], "expl": "飲酒後に顔面紅潮（フラッシング）を来すALDH2低活性（inactive）の人でアセトアルデヒドが蓄積し扁平上皮癌リスクが高い。「活性が高い」は誤り。扁平上皮癌約95%、飲酒・喫煙が2大リスク、Mt好発、頭頸部などの重複癌が多い（約20%）は正しい。"}, {"id": 72, "group": "画像・内視鏡・病理", "cat": "食道癌・内視鏡治療", "type": "single", "ref": "食道癌に対する内視鏡治療", "case": "62歳男性。大量飲酒歴・喫煙歴あり。上部消化管内視鏡でヨード（ルゴール）不染帯を認め、生検で扁平上皮癌と診断。NBIおよび超音波内視鏡で深達度は粘膜下層深部（SM2）と評価された。CTで遠隔転移・明らかなリンパ節腫大は認めない。", "q": "治療方針として最も適切なのはどれか。", "choices": [["a", "EMRによる切除"], ["b", "ESDによる切除"], ["c", "リンパ節転移リスクが高く内視鏡治療は非適応で、外科手術または化学放射線療法を考慮する"], ["d", "経過観察"], ["e", "ヨード散布の反復"]], "answer": ["c"], "expl": "食道扁平上皮癌のSM癌はリンパ節転移率が約20〜50%と高く内視鏡治療は非適応。外科手術や化学放射線療法を考慮する。内視鏡治療の絶対適応はEP〜LPMの粘膜内癌で、MM癌（転移率約5〜12%）は相対的適応にとどまる。"}, {"id": 73, "group": "画像・内視鏡・病理", "cat": "消化管早期癌・リンパ節転移", "type": "single", "ref": "リンパ節転移率（外科切除例）", "case": "", "q": "粘膜内癌（M癌）のリンパ節転移に関する記述で正しいのはどれか。", "choices": [["a", "胃粘膜内癌のリンパ節転移率は約30%である"], ["b", "食道扁平上皮の粘膜内癌はリンパ節転移がほぼない"], ["c", "大腸粘膜内癌のリンパ節転移率はほぼ0%である"], ["d", "大腸粘膜下層癌の転移率は50%を超える"], ["e", "深達度が深いほどリンパ節転移率は低下する"]], "answer": ["c"], "expl": "大腸粘膜内癌はリンパ節転移がほぼ0%とされ内視鏡的切除で根治が期待できる。胃M癌は約2.2%、食道扁平上皮のM癌は約15%と比較的高い。大腸SM癌は約10%。粘膜下層へ深く浸潤するほど転移率は上昇する。"}, {"id": 74, "group": "画像・内視鏡・病理", "cat": "大腸・前処置", "type": "multiple", "ref": "大腸前処置 腸管洗浄剤", "case": "", "q": "大腸内視鏡検査前の腸管洗浄剤（ニフレック等）投与が禁忌となる病態を2つ選べ。", "choices": [["a", "腸閉塞（イレウス）の疑い"], ["b", "消化管穿孔"], ["c", "便潜血陽性"], ["d", "大腸ポリープの既往"], ["e", "軽度の高血圧"]], "answer": ["a", "b"], "expl": "腸管洗浄剤は腸閉塞（疑いを含む）・消化管穿孔・中毒性巨大結腸症・胃排出不全で禁忌。腸管内圧上昇により穿孔・腹膜炎を来す危険がある。強い腹痛・嘔吐時はイレウス／穿孔を念頭に直ちに内服中止する。便潜血陽性やポリープはむしろ検査適応である。"}, {"id": 75, "group": "食道・胃", "cat": "GERD", "type": "single", "ref": "上部消化管良性疾患・GERD", "case": "58歳の男性。数か月前から食後や就寝時の胸やけと呑酸を自覚し受診した。上部消化管内視鏡で食道胃接合部に縦走するびらんを認めた。", "q": "本症の主たる病態として最も適切なのはどれか。", "choices": [["a", "一過性の下部食道括約筋（LES）弛緩による胃酸逆流"], ["b", "LES圧の上昇による食道内圧の亢進"], ["c", "胃排出の亢進による胃内容の急速な十二指腸移行"], ["d", "食道の酸クリアランス亢進"], ["e", "胃酸分泌能の著明な低下"]], "answer": ["a"], "expl": "GERDの中心的病態は一過性LES弛緩と低LES圧による胃酸逆流、および食道内の過剰な胃酸曝露である。LES圧上昇・胃排出亢進・酸クリアランス亢進・酸分泌低下はいずれも逆流を来しにくく誤り。"}, {"id": 76, "group": "食道・胃", "cat": "GERD", "type": "multiple", "ref": "上部消化管良性疾患・GERD発症要因", "case": "", "q": "GERDの発症・増悪に関与する因子はどれか。2つ選べ。", "choices": [["a", "食道裂孔ヘルニア"], ["b", "下部食道括約筋圧の上昇"], ["c", "肥満・過食"], ["d", "胃排出の亢進"], ["e", "唾液分泌の増加"]], "answer": ["a", "c"], "expl": "食道裂孔ヘルニアはLES機能を障害し逆流を助長する。肥満・過食は腹圧・胃内圧を上昇させ逆流を増悪させる。LES圧上昇・胃排出亢進・唾液（緩衝作用による酸クリアランス）増加はいずれも逆流を軽減する方向で誤り。"}, {"id": 77, "group": "食道・胃", "cat": "GERD・食道外症状", "type": "single", "ref": "上部消化管良性疾患・GERD症状", "case": "", "q": "GERDが背景となりうる非定型（食道外）症状として適切でないのはどれか。", "choices": [["a", "しつこい慢性咳嗽"], ["b", "嗄声・咽頭違和感"], ["c", "狭心症様の胸痛・背部痛"], ["d", "間欠性跛行"], ["e", "睡眠障害"]], "answer": ["d"], "expl": "GERDは呼吸器症状（咳・喀痰）、耳鼻咽喉症状（嗄声・喉のつかえ）、狭心症様の非心臓性胸痛、不眠など多彩な食道外症状を呈する。間欠性跛行は末梢動脈疾患などの症状でGERDとは無関係。"}, {"id": 78, "group": "食道・胃", "cat": "胃酸分泌機構", "type": "single", "ref": "上部消化管良性疾患・酸分泌機構", "case": "", "q": "胃壁細胞からの胃酸分泌の最終段階を直接担う分子はどれか。", "choices": [["a", "ヒスタミンH2受容体"], ["b", "ガストリン受容体"], ["c", "ムスカリン（アセチルコリン）受容体"], ["d", "H+,K+-ATPase（プロトンポンプ）"], ["e", "Na+,K+-ATPase"]], "answer": ["d"], "expl": "胃酸分泌にはヒスタミン・ガストリン・アセチルコリンの3受容体が関与するが、最終的にはプロトンポンプ（H+,K+-ATPase）がATPを用いてH+を胃内へ、K+を細胞内へ輸送し分泌が完結する。よってプロトンポンプ阻害が最も強力な酸分泌抑制手段となる。"}, {"id": 79, "group": "食道・胃", "cat": "酸分泌抑制薬", "type": "multiple", "ref": "上部消化管良性疾患・PPI/P-CAB", "case": "", "q": "酸分泌抑制薬に関する記述で正しいのはどれか。2つ選べ。", "choices": [["a", "PPIはH+,K+-ATPaseに結合して酵素活性を阻害する"], ["b", "ボノプラザン（P-CAB）はプロトンポンプ稼働に必要なK+に選択的・競合的に結合して阻害する"], ["c", "H2受容体拮抗薬はプロトンポンプを直接不可逆的に阻害する"], ["d", "ボノプラザンはヒスタミンH2受容体を遮断して作用する"], ["e", "PPIはガストリン受容体を遮断する"]], "answer": ["a", "b"], "expl": "PPIはH+,K+-ATPaseに結合し酵素活性を阻害する。P-CAB（ボノプラザン）はポンプ稼働に必要なK+に選択的に競合して阻害する。H2拮抗薬はヒスタミンH2受容体を遮断するもので、ポンプを直接阻害はしない。cde は作用機序が誤り。"}, {"id": 80, "group": "食道・胃", "cat": "消化性潰瘍・H. pylori", "type": "single", "ref": "消化性潰瘍診療ガイドライン2026", "case": "65歳の男性。心窩部痛で受診。上部消化管内視鏡で胃角部に潰瘍を認め、迅速ウレアーゼ試験でHelicobacter pylori陽性であった。悪性所見はなかった。", "q": "治療方針として最も適切なのはどれか。", "choices": [["a", "酸分泌抑制薬に加えて除菌治療を行う"], ["b", "酸分泌抑制薬のみとし除菌は行わない"], ["c", "ただちに胃切除術を行う"], ["d", "無治療で経過観察する"], ["e", "副腎皮質ステロイドを投与する"]], "answer": ["a"], "expl": "消化性潰瘍診療ガイドライン2026では、H. pylori陽性の胃・十二指腸潰瘍は除菌治療が基本かつ前提。除菌により潰瘍治癒促進と再発抑制が得られる。除菌を行わない・手術・無治療・ステロイドは不適切。"}, {"id": 81, "group": "食道・胃", "cat": "上部消化管出血", "type": "multiple", "ref": "消化性潰瘍診療ガイドライン2026・上部消化管出血", "case": "70歳の男性。大量の吐血を主訴に救急搬送された。顔面蒼白、血圧84/50mmHg、脈拍118/分でショック状態である。", "q": "この時点で行うべき対応として適切なのはどれか。2つ選べ。", "choices": [["a", "経口補水液を大量に飲ませる"], ["b", "静脈路を確保し輸液・輸血を行う"], ["c", "全身状態を把握しつつ緊急上部消化管内視鏡で止血処置を行う"], ["d", "バイタルが完全に安定するまで検査・処置をすべて延期する"], ["e", "昇圧目的でただちに経口鉄剤を投与する"]], "answer": ["b", "c"], "expl": "上部消化管出血ではバイタル確認・酸素投与・血管確保・採血を行い、ショックには輸液/輸血で対処しつつ内視鏡で止血する。吐血・ショック下での経口摂取は誤嚥・不十分で不適切、処置の全面延期も救命上不適切、経口鉄剤に急性昇圧作用はない。"}, {"id": 82, "group": "食道・胃", "cat": "胃の画像診断", "type": "single", "ref": "上部消化管良性疾患・胃の画像検査法", "case": "", "q": "胃壁の縦断像（層構造）が得られ、癌の深達度診断に最も有用な検査はどれか。", "choices": [["a", "バリウムによるX線透視検査"], ["b", "通常の上部消化管内視鏡検査"], ["c", "超音波内視鏡検査（EUS）"], ["d", "腹部単純X線撮影"], ["e", "便潜血検査"]], "answer": ["c"], "expl": "超音波内視鏡（EUS）は胃壁の縦断的な層構造像が得られ、癌の深達度診断が容易である。X線透視は病変範囲把握に優れるが病理診断や深達度評価は不可、通常内視鏡は粘膜面の観察と生検に優れるが層の深達度は評価しにくい。"}, {"id": 83, "group": "大腸・IBD", "cat": "虚血性腸炎", "type": "single", "ref": "虚血性腸炎", "case": "72歳の女性。突然の腹痛と血便を主訴に来院した。数年来の便秘があり、今朝トイレでいきんだ直後に強い左下腹部痛が出現し、続いて鮮血便がみられた。海外渡航歴はない。体温37.0℃、脈拍84/分、整。血圧138/82mmHg。腹部は平坦・軟で左下腹部に圧痛を認めるが、筋性防御や反跳痛はない。注腸造影で下行結腸に拇指圧痕像を認める。", "q": "最も考えられる疾患はどれか。", "choices": [["a", "潰瘍性大腸炎"], ["b", "クローン病"], ["c", "虚血性腸炎"], ["d", "アメーバ性大腸炎"], ["e", "偽膜性腸炎"]], "answer": ["c"], "expl": "高齢女性・便秘の後の突然発症の腹痛と血便・筋性防御なしは虚血性腸炎の典型像。好発部位は下行結腸〜S状結腸（下腸間膜動脈領域）で、注腸の拇指圧痕像（thumb printing）、内視鏡では腸間膜付着側に一致した縦走潰瘍が特徴。多くは一過性型で消化管安静・禁食・補液で軽快する。"}, {"id": 84, "group": "大腸・IBD", "cat": "IBD鑑別（クローン病）", "type": "multiple", "ref": "cf.119A7", "case": "", "q": "クローン病に特徴的な所見はどれか。2つ選べ。", "choices": [["a", "陰窩膿瘍"], ["b", "縦走潰瘍"], ["c", "血管透見像の消失"], ["d", "非乾酪性類上皮細胞肉芽腫"], ["e", "直腸から連続するびまん性病変"]], "answer": ["b", "d"], "expl": "クローン病は非連続性(skip lesion)の全層性炎症で、縦走潰瘍・敷石像・粘膜下層の非乾酪性類上皮細胞肉芽腫が特徴。陰窩膿瘍・血管透見像消失・直腸からの連続性病変は潰瘍性大腸炎の所見。乾酪性肉芽腫なら腸結核を考える。"}, {"id": 85, "group": "大腸・IBD", "cat": "腸管ベーチェット病", "type": "single", "ref": "腸管ベーチェット", "case": "31歳の男性。腹痛と下血を主訴に来院した。以前から再発性の口腔内アフタと陰部潰瘍を繰り返しており、両眼のぶどう膜炎の既往がある。数日前から右下腹部痛と少量の下血が出現した。下部消化管内視鏡で回盲部に境界明瞭で深く掘れた円形の潰瘍を認める。", "q": "この潰瘍の内視鏡所見として最も適切なのはどれか。", "choices": [["a", "打ち抜き潰瘍（punched-out ulcer）"], ["b", "敷石像"], ["c", "輪状潰瘍"], ["d", "地図状潰瘍"], ["e", "アフタ様びらんの散在"]], "answer": ["a"], "expl": "口腔内アフタ・陰部潰瘍・ぶどう膜炎を背景に回盲部の深い円形〜卵円形潰瘍をきたすのは腸管ベーチェット病。深く掘れた打ち抜き潰瘍（punched-out ulcer）が典型。治療はステロイド・メサラジン、難治例に抗TNF-α抗体、穿孔・出血は手術適応。輪状潰瘍は腸結核、敷石像はクローン病を示唆する。"}, {"id": 86, "group": "大腸・IBD", "cat": "薬剤起因性腸炎（偽膜性腸炎）", "type": "single", "ref": "薬剤起因性腸炎", "case": "78歳の男性。肺炎に対し広域抗菌薬の投与を受けていた。投与開始10日後から1日8回の水様下痢と発熱、下腹部痛が出現した。下部消化管内視鏡で大腸粘膜に黄白色の半球状隆起が多発している。", "q": "治療薬として適切なのはどれか。", "choices": [["a", "メサラジン経口"], ["b", "バンコマイシン経口"], ["c", "プレドニゾロン点滴静注"], ["d", "インフリキシマブ点滴静注"], ["e", "アザチオプリン経口"]], "answer": ["b"], "expl": "抗菌薬長期投与後の菌交代現象でClostridioides difficileが増殖して起こる偽膜性腸炎。黄白色の偽膜が特徴的な内視鏡所見で、治療は経口バンコマイシンまたはメトロニダゾール。原因抗菌薬の中止も重要。ステロイドや生物学的製剤はIBDの治療であり本症には用いない。"}, {"id": 87, "group": "大腸・IBD", "cat": "遺伝性腸炎（CEAS）", "type": "single", "ref": "非特異性多発性小腸潰瘍症", "case": "", "q": "非特異性多発性小腸潰瘍症（CEAS）について正しいのはどれか。", "choices": [["a", "SLCO2A1遺伝子の変異に起因する遺伝性疾患である"], ["b", "主病変は終末回腸に限局する"], ["c", "乾酪性肉芽腫を認める"], ["d", "大量下血で急性発症するのが典型である"], ["e", "血管透見像の消失が診断の決め手となる"]], "answer": ["a"], "expl": "非特異性多発性小腸潰瘍症は、プロスタグランジン輸送蛋白をコードするSLCO2A1遺伝子変異による遺伝性疾患で、chronic enteropathy associated with SLCO2A1 gene（CEAS）と呼ばれる。持続的な鉄欠乏性貧血と低蛋白血症を特徴とし、終末回腸を避けた中部・下部回腸に境界明瞭な平坦潰瘍が多発する。"}, {"id": 88, "group": "大腸・IBD", "cat": "感染性腸炎（EHEC/HUS）", "type": "single", "ref": "感染性腸炎", "case": "6歳の女児。腹痛と血便を主訴に来院した。数日前に加熱不十分な牛肉を摂取した。当初は水様下痢であったが、翌日から血便に変化した。本日は尿量が減少し顔色不良となった。血液検査で貧血の進行、破砕赤血球、血小板減少、血清クレアチニンの上昇を認める。", "q": "原因として最も考えられるのはどれか。", "choices": [["a", "コレラ菌"], ["b", "チフス菌"], ["c", "赤痢アメーバ"], ["d", "ベロ毒素産生性大腸菌（O-157）"], ["e", "カンピロバクター"]], "answer": ["d"], "expl": "加熱不十分な食肉摂取後の血便に、溶血性貧血・血小板減少・急性腎不全を合併しており、ベロ毒素産生性の腸管出血性大腸菌（O-157等）による溶血性尿毒症症候群（HUS）を示唆する。小児・高齢者で重症化しやすい。3類感染症で診断後直ちに届け出る。"}, {"id": 89, "group": "大腸・IBD", "cat": "潰瘍性大腸炎（治療）", "type": "single", "ref": "潰瘍性大腸炎", "case": "", "q": "軽症〜中等症の潰瘍性大腸炎における寛解導入・維持の第一選択薬はどれか。", "choices": [["a", "メサラジン（5-ASA）製剤"], ["b", "プレドニゾロン大量静注"], ["c", "タクロリムス経口"], ["d", "インフリキシマブ点滴静注"], ["e", "シクロスポリン持続静注"]], "answer": ["a"], "expl": "潰瘍性大腸炎の基本治療はメサラジン（5-ASA）製剤による寛解導入・維持で、経口剤・注腸剤・坐剤を用いる。5-ASAで寛解導入が困難な場合にステロイドを追加する。ステロイド大量静注・タクロリムス・シクロスポリン持続静注・インフリキシマブは重症〜劇症例や難治例に用いる。"}, {"id": 90, "group": "大腸・IBD", "cat": "潰瘍性大腸炎（病態・合併症）", "type": "multiple", "ref": "潰瘍性大腸炎", "case": "", "q": "潰瘍性大腸炎について正しいのはどれか。2つ選べ。", "choices": [["a", "病変は直腸から連続性に口側へ広がる"], ["b", "炎症は漿膜に及ぶ全層性である"], ["c", "長期経過例では大腸癌のリスクが上昇する"], ["d", "好発部位は回盲部である"], ["e", "腸管外合併症を伴うことはない"]], "answer": ["a", "c"], "expl": "潰瘍性大腸炎は直腸から連続性に口側へ広がるびまん性炎症で、炎症は粘膜〜粘膜下層に限局する（全層性炎症はクローン病）。慢性持続型・全結腸型・若年発症型はハイリスク群で、長期経過（発症30年で約30%）で大腸癌のリスクが上昇する。腸管外合併症として硬化性胆管炎・壊疽性膿皮症・強膜炎などを伴いうる。"}, {"id": 91, "group": "食道・胃", "cat": "食道癌・疫学", "type": "single", "ref": "食道・疫学", "case": "", "q": "本邦における食道癌の疫学と組織型について正しいのはどれか。", "choices": [["a", "組織型では腺癌が約9割を占める"], ["b", "好発部位は胸部中部食道である"], ["c", "女性に多く発症する"], ["d", "20歳代の若年男性に好発する"], ["e", "近年、扁平上皮癌の発生が増加傾向にある"]], "answer": ["b"], "expl": "本邦の食道癌は約9割が扁平上皮癌で、好発部位は胸部中部食道（約46%）。50歳代以上の男性に多い。近年は逆流性食道炎を背景とした腺癌（下部食道・食道胃接合部）が増加傾向にある。"}, {"id": 92, "group": "食道・胃", "cat": "食道扁平上皮癌・危険因子", "type": "multiple", "ref": "食道・危険因子", "case": "", "q": "食道扁平上皮癌の危険因子として適切なものを2つ選べ。", "choices": [["a", "肥満"], ["b", "飲酒・喫煙"], ["c", "ピロリ菌感染"], ["d", "ALDH2ヘテロ欠損（フラッシャー）"], ["e", "食道裂孔ヘルニア"]], "answer": ["b", "d"], "expl": "食道扁平上皮癌の危険因子は飲酒・喫煙、野菜果実摂取不足、やせ、濃い酒のストレート飲用など。ALDH2ヘテロ欠損者（飲酒で顔が赤くなるフラッシャー）はアセトアルデヒドの分解が遅く発癌リスクが高い。肥満・食道裂孔ヘルニア・逆流は腺癌の危険因子。"}, {"id": 93, "group": "食道・胃", "cat": "バレット食道", "type": "single", "ref": "食道・バレット食道", "case": "", "q": "バレット食道について正しいのはどれか。", "choices": [["a", "扁平上皮癌の発生母地となる"], ["b", "食道粘膜が円柱上皮に置換された状態である"], ["c", "上部食道に好発する"], ["d", "全周性に3cm以上のものをSSBEと呼ぶ"], ["e", "主な原因は喫煙である"]], "answer": ["b"], "expl": "バレット食道は胃酸逆流により食道扁平上皮が円柱上皮に置換された状態で、下部食道に生じ、腺癌の発生母地となる。全周性に3cm以上をLSBE、3cm未満をSSBEと呼ぶ。円柱上皮下の柵状血管網や粘膜筋板の二重構造が特徴。"}, {"id": 94, "group": "食道・胃", "cat": "食道癌・治療", "type": "single", "ref": "食道・外科治療", "case": "65歳男性。嚥下時のつかえ感を主訴に受診。上部消化管内視鏡で胸部中部食道に扁平上皮癌を認め、cT3N1M0 cStage IIIと診断された。耐術能に問題はない。", "q": "胸部食道癌に対する標準的な外科治療として適切なのはどれか。", "choices": [["a", "内視鏡的粘膜下層剥離術（ESD）"], ["b", "食道亜全摘＋3領域リンパ節郭清"], ["c", "噴門形成術（Nissen法）"], ["d", "Heller筋層切開術"], ["e", "経過観察"]], "answer": ["b"], "expl": "胸部食道癌は頸部・胸部・腹部の3領域に広範なリンパ節転移をきたしやすく、右胸腔経路での胸腹部食道全摘（亜全摘）＋3領域リンパ節郭清が基本術式。両側反回神経周囲リンパ節転移が多いため頸部上縦隔郭清が重要。cStage II/IIIでは術前DCF療法後に手術を行う。"}, {"id": 95, "group": "食道・胃", "cat": "食道再建", "type": "single", "ref": "食道・再建経路", "case": "", "q": "食道癌術後の再建経路のうち、後縦隔経路（生理的ルートに最も近い経路）の特徴として正しいのはどれか。", "choices": [["a", "再建距離が最も長い"], ["b", "縫合不全の発生頻度が最も高い"], ["c", "再建臓器に癌ができた場合の治療が最も容易"], ["d", "手術侵襲が少なく縫合不全の発生頻度が少ない"], ["e", "再建臓器による心臓圧迫が起こりやすい"]], "answer": ["d"], "expl": "後縦隔経路は生理的ルートに最も近く、再建距離が短く手術侵襲が少なく縫合不全の発生頻度が少ない。一方で縫合不全が重篤化しやすい、逆流が多い、再建臓器に癌ができた場合の手術が困難などの欠点がある。再建臓器は胃管が基本。"}, {"id": 96, "group": "食道・胃", "cat": "食道アカラシア", "type": "multiple", "ref": "食道・アカラシア", "case": "32歳女性。数年前からの嚥下困難を主訴に受診。固形物よりも冷水で症状が誘発されやすく、精神的緊張で増悪する。食道X線造影を施行した。", "q": "食道アカラシアについて正しいものを2つ選べ。", "choices": [["a", "食道X線造影で食道胃接合部にBird beak signを認める"], ["b", "下部食道括約部の嚥下性弛緩不全を認める"], ["c", "高齢者に好発し男性に多い"], ["d", "下部食道括約部圧は胃内圧より低下する"], ["e", "内視鏡は食道胃接合部を通過しない"]], "answer": ["a", "b"], "expl": "アカラシアは下部食道括約部の弛緩不全と食道体部の蠕動障害を認める原因不明の運動機能障害。20〜40歳代に多く男女差なし。X線造影でBird beak sign（平滑な狭小像）、食道内圧測定で下部食道括約部の嚥下性弛緩不全・LES圧上昇（胃内圧より高い）を認める。内視鏡は送気で開大しないが通過はする。"}, {"id": 97, "group": "食道・胃", "cat": "食道アカラシア・治療", "type": "single", "ref": "食道・POEM", "case": "", "q": "食道アカラシアの治療について正しいのはどれか。", "choices": [["a", "外科治療ではHeller筋層切開術にNissen法を併用するのが標準である"], ["b", "バルーン拡張術は40歳未満の若年者で有効率が高い"], ["c", "薬物治療としてカルシウム拮抗薬や亜硝酸薬が用いられる"], ["d", "POEMは食道外側から筋層切開を行う術式である"], ["e", "薬物治療が第一選択で根治率が高い"]], "answer": ["c"], "expl": "薬物治療はカルシウム拮抗薬や亜硝酸薬が用いられるが対症的。外科治療はHeller筋層切開術に逆流防止のためDor法を併用する術式が標準（奏効率90%前後）。バルーン拡張は若年者で有効率不良。POEMは経口内視鏡下に食道粘膜下層で筋層（内輪筋）を切開する低侵襲治療で第一選択になりつつある。"}, {"id": 98, "group": "食道・胃", "cat": "食道破裂・損傷", "type": "single", "ref": "食道・Boerhaave症候群", "case": "45歳男性。飲酒後に激しく嘔吐した直後から突然の激しい胸痛が出現。頸部の皮下気腫と呼吸促迫を認める。胸部X線で縦隔気腫像（Naclerio V sign）を認めた。", "q": "最も考えられる疾患はどれか。", "choices": [["a", "Mallory-Weiss症候群"], ["b", "特発性食道破裂（Boerhaave症候群）"], ["c", "食道アカラシア"], ["d", "Zenker憩室"], ["e", "逆流性食道炎"]], "answer": ["b"], "expl": "嘔吐後の激しい胸痛・頸部皮下気腫・呼吸促迫、縦隔気腫像（Naclerio V sign）は特発性食道破裂（Boerhaave症候群）に特徴的。30〜40歳代男性、食道末端部左後壁に好発。造影はGastrografinを用いる。発症12時間以内なら直接縫合、以降はドレナージ。Mallory-Weiss症候群は噴門部粘膜の縦裂創で無痛性吐血をきたし保存的治療が主。"}, {"id": 99, "group": "画像・内視鏡・病理", "cat": "消化管リンパ腫", "type": "single", "ref": "胃MALTリンパ腫", "case": "55歳男性。数か月続く心窩部不快感で受診。上部消化管内視鏡で胃体部に白色調の小顆粒状隆起が多発。生検で小型異型リンパ球のびまん性浸潤と、腺窩上皮を破壊するlymphoepithelial lesion（LEL）を認め、腫瘍細胞はCD20陽性であった。", "q": "この疾患について最も適切なのはどれか。", "choices": [["a", "Helicobacter pylori感染が病因に関与する"], ["b", "T細胞由来の腫瘍である"], ["c", "高悪性度リンパ腫に分類される"], ["d", "第一選択は胃全摘術である"], ["e", "除菌治療は病態に無効である"]], "answer": ["a"], "expl": "胃MALTリンパ腫（節外性辺縁帯リンパ腫）はB細胞性・低悪性度で、H. pylori感染が70〜90%に関与する。LEL・小型異型リンパ球浸潤が特徴。CD20陽性のB細胞腫瘍で、限局期はまず除菌治療を行い注意深い経過観察が選択肢となる。"}, {"id": 100, "group": "画像・内視鏡・病理", "cat": "消化管リンパ腫", "type": "single", "ref": "MALTリンパ腫の分子病理", "case": "", "q": "胃MALTリンパ腫に特徴的な染色体異常と、その結果生じる分子病態の組合せで正しいのはどれか。", "choices": [["a", "t(11;18)(q21;q21) ─ NF-κBの恒常的活性化"], ["b", "t(14;18)(q32;q21) ─ MYCの過剰発現"], ["c", "t(8;14)(q24;q32) ─ BCL2の恒常的活性化"], ["d", "t(9;22)(q34;q11) ─ BCR-ABL融合"], ["e", "t(15;17)(q22;q12) ─ PML-RARA融合"]], "answer": ["a"], "expl": "MALTリンパ腫ではt(11;18)によりAPI2（AP12）-MALT1キメラ遺伝子が形成され、t(1;14)とともにNF-κBの恒常的活性化に至る。炎症がこの腫瘍の成因に関与する分子的証左とされる。"}, {"id": 101, "group": "画像・内視鏡・病理", "cat": "消化管リンパ腫", "type": "single", "ref": "十二指腸型濾胞性リンパ腫", "case": "48歳女性。無症状で受けた上部消化管内視鏡で、十二指腸下行脚に白色調の小顆粒状隆起が多発。生検で濾胞様構造を伴う小型〜中型異型リンパ球の増殖を認め、CD20陽性・CD10陽性・BCL2陽性であった。全身検索で明らかなリンパ節腫大や他部位病変はない。", "q": "この病態について最も適切なのはどれか。", "choices": [["a", "予後は極めて良好で、多くは積極的治療を行わず経過観察（watch-and-wait）とする"], ["b", "高悪性度リンパ腫であり、直ちに大量化学療法が必要である"], ["c", "胃に好発し、H. pylori除菌が第一選択である"], ["d", "診断時の大半がすでに骨髄浸潤を伴う進行期である"], ["e", "細胞由来はT細胞である"]], "answer": ["a"], "expl": "十二指腸型濾胞性リンパ腫は下行脚に好発する低悪性度B細胞リンパ腫で、CD10+・BCL2転座を示す胚中心由来。長期予後は極めて良好で、多くはwatch-and-waitとされる。節性FLの消化管浸潤とは生物学的・臨床的性質が異なる。"}, {"id": 102, "group": "画像・内視鏡・病理", "cat": "粘膜下腫瘍・GIST", "type": "multiple", "ref": "消化管間質腫瘍（GIST）", "case": "", "q": "消化管間質腫瘍（GIST）について正しいものを2つ選べ。", "choices": [["a", "大半はc-kitまたはPDGFRA遺伝子変異を有する"], ["b", "免疫組織化学でKIT（CD117）やCD34が陽性となる"], ["c", "発生部位は食道が最も多い"], ["d", "リンパ節転移をきたす頻度が高い"], ["e", "desminがびまん性に陽性となる"]], "answer": ["a", "b"], "expl": "GISTは紡錘形/類上皮型の間葉系腫瘍で、c-kit（exon11が最多）またはPDGFRA変異を有し、KIT・CD34・DOG1が陽性。発生は胃が約54%と最多、小腸が約30%。浸潤傾向は乏しくリンパ節転移は稀。desmin陽性は平滑筋腫、S100陽性は神経鞘腫を示唆しGISTを否定する。"}, {"id": 103, "group": "画像・内視鏡・病理", "cat": "粘膜下腫瘍・GIST", "type": "single", "ref": "GISTの薬物療法", "case": "68歳男性。胃粘膜下腫瘍として発見された腫瘍径8cm・核分裂像高値の腫瘍を切除後、多発肝転移を認めた。免疫染色でKIT陽性、c-kit exon11変異を確認した。", "q": "転移・再発GISTに対する一次薬物療法として最も適切なのはどれか。", "choices": [["a", "イマチニブ"], ["b", "スニチニブ"], ["c", "レゴラフェニブ"], ["d", "リツキシマブ"], ["e", "ポラツズマブ ベドチン"]], "answer": ["a"], "expl": "GISTのリスクは腫瘍径と核分裂像で決まり、転移は主に腹腔内（肝臓・腹膜）に生じる。薬物療法はチロシンキナーゼ阻害薬のイマチニブが一次、無効・不耐でスニチニブ（二次）、レゴラフェニブ（三次）と進む。リツキシマブ・ポラツズマブはB細胞リンパ腫の薬剤。"}, {"id": 104, "group": "画像・内視鏡・病理", "cat": "神経内分泌腫瘍", "type": "multiple", "ref": "消化管神経内分泌腫瘍（NET）", "case": "", "q": "消化管の神経内分泌腫瘍（NET）について正しいものを2つ選べ。", "choices": [["a", "消化管では直腸に最も多く発生する"], ["b", "腫瘍径10mm以上は転移リスク因子である"], ["c", "由来はB細胞（CD20陽性）である"], ["d", "synaptophysinやINSM1は陰性である"], ["e", "WHO分類のグレード分類にKi-67指数や核分裂像は用いない"]], "answer": ["a", "b"], "expl": "NETは神経内分泌細胞（クロム親和性細胞）由来で、直腸＞胃＞十二指腸＞小腸の順に多い。synaptophysin・INSM1が陽性。WHO2019分類ではKi-67指数と核分裂像でG1〜G3にグレード分類する。転移リスク因子は核分裂像・Ki-67陽性率・大きさ（10mm以上）・脈管侵襲・潰瘍形成。"}, {"id": 105, "group": "画像・内視鏡・病理", "cat": "食道炎", "type": "single", "ref": "食道ヘルペス感染", "case": "62歳男性。血液悪性腫瘍で化学療法中。強い嚥下痛を訴え、上部消化管内視鏡で食道に小水疱・びらん・小潰瘍が多発。生検で扁平上皮細胞の核内にCowdry type Aの核内封入体を認めた。", "q": "この食道炎の起因病原体として最も考えられるのはどれか。", "choices": [["a", "単純ヘルペスウイルス（HSV）"], ["b", "カンジダ・アルビカンス"], ["c", "Helicobacter pylori"], ["d", "結核菌"], ["e", "Clostridioides difficile"]], "answer": ["a"], "expl": "食道ヘルペスは三叉神経節に潜伏したHSVが再活性化して重層扁平上皮に感染するもので、多くは免疫抑制状態で発症。小水疱→びらん・小潰瘍を呈し、感染細胞にCowdry type Aの核内封入体をみる。食道カンジダ症は白苔付着を呈する日和見感染で鑑別を要する。"}, {"id": 106, "group": "画像・内視鏡・病理", "cat": "腸炎", "type": "single", "ref": "偽膜性腸炎", "case": "78歳女性。肺炎に対する抗菌薬投与後から頻回の水様性下痢が出現。大腸内視鏡で全大腸、特に直腸側に強く黄白色の偽膜が多発して付着していた。", "q": "この病態について正しいのはどれか。", "choices": [["a", "抗菌薬による菌交代現象でClostridioides difficileが増殖し、その毒素が上皮を傷害する"], ["b", "偽膜は再生した正常扁平上皮で構成される"], ["c", "治療は原因抗菌薬を増量することである"], ["d", "好発部位は食道であり大腸には生じない"], ["e", "高齢者や重篤な基礎疾患をもつ患者では稀である"]], "answer": ["a"], "expl": "偽膜性腸炎は抗菌薬による菌交代現象でC. difficileが増殖し、産生毒素が上皮を傷害して発症する。偽膜はフィブリンと炎症性細胞浸潤産物からなる。高齢者・術後・腎不全・ショックなど重篤な基礎疾患で起こりやすく、全大腸（直腸に所見が強い）に好発。治療は原因薬の中止で、重症例にバンコマイシンが有用。"}, {"id": 107, "group": "胆・膵", "cat": "膵胆管合流異常症", "type": "single", "ref": "膵胆管合流異常症(PBM)", "case": "", "q": "膵胆管合流異常症について正しいのはどれか。", "choices": [["a", "膵液と胆汁の相互逆流とは無関係である。"], ["b", "胆管拡張型では胆嚢癌よりも胆管癌のリスクが高い。"], ["c", "胆管非拡張型は経過観察でよい。"], ["d", "Oddi括約筋が共通管を締め付けるために生じる。"], ["e", "胆道癌のリスクファクターではない。"]], "answer": ["b"], "expl": "膵胆管合流異常症は括約筋作用の及ばない部位で膵管と胆管が合流し、膵液と胆汁の相互逆流を生じる。胆道癌の重要なリスクファクターで、胆管拡張型（胆道拡張症を合併）は胆管癌リスクが高く、予防的に胆嚢摘出＋肝外胆管切除＋胆管空腸吻合（分流手術）を行う。胆管非拡張型は胆嚢癌リスクが高く、予防的胆嚢摘出が行われる。"}, {"id": 108, "group": "胆・膵", "cat": "急性胆管炎", "type": "single", "ref": "急性閉塞性化膿性胆管炎(AOSC)", "case": "72歳女性。発熱、黄疸、右上腹部痛で来院。来院時、血圧78/50mmHg、意識レベルの低下を認める。血液検査でALP・γ-GTP・T-Bilの上昇があり、腹部CTで総胆管結石と総胆管拡張を認める。", "q": "この病態と初期対応で正しいのはどれか。", "choices": [["a", "Charcot3徴のみを満たす典型的経過である。"], ["b", "まず緊急開腹手術を行う。"], ["c", "緊急胆道ドレナージと全身状態の改善を行う。"], ["d", "抗菌薬投与は不要である。"], ["e", "死亡率は低く予後良好である。"]], "answer": ["c"], "expl": "発熱・黄疸・腹痛（Charcot3徴）にショック・意識障害が加わったReynolds5徴で、急性閉塞性化膿性胆管炎（AOSC）を示す。死亡率が高く、まず必要な処置は緊急胆道ドレナージと全身状態の改善であり、緊急手術の対象とはならない。"}, {"id": 109, "group": "胆・膵", "cat": "膵神経内分泌腫瘍", "type": "single", "ref": "膵神経内分泌腫瘍(インスリノーマ)", "case": "45歳男性。早朝空腹時に意識障害を繰り返す。発作時の血糖は45mg/dLで、ブドウ糖静注により症状は速やかに回復した。造影CTで膵体部に動脈相で濃染される多血性の小腫瘍を認める。", "q": "最も考えられる疾患はどれか。", "choices": [["a", "ガストリノーマ"], ["b", "インスリノーマ"], ["c", "通常型膵管癌"], ["d", "ソマトスタチノーマ"], ["e", "漿液性嚢胞腫瘍"]], "answer": ["b"], "expl": "空腹時・運動時の中枢神経症状、発作時血糖50mg/dL以下、ブドウ糖投与で急速回復のWhipple3徴はインスリノーマを示唆する。膵神経内分泌腫瘍は典型的に多血性で造影CTで濃染され、乏血性の膵管癌と対照的である。"}, {"id": 110, "group": "胆・膵", "cat": "膵嚢胞性疾患", "type": "multiple", "ref": "IPMN(分枝型)の手術適応", "case": "", "q": "分枝型膵管内乳頭粘液性腫瘍（IPMN）で手術の絶対適応となる所見はどれか。2つ選べ。", "choices": [["a", "閉塞性黄疸を伴う。"], ["b", "造影剤で染まる5mm以上の壁在結節を認める。"], ["c", "嚢胞径が20mmである。"], ["d", "主膵管径が6mmである。"], ["e", "尾側膵の萎縮のみを認める。"]], "answer": ["a", "b"], "expl": "分枝型IPMNの絶対適応（high-risk stigmata）は、閉塞性黄疸、造影される5mm以上の壁在結節、主膵管径10mm以上。嚢胞径30mm以上、主膵管径5〜9mm、尾側膵萎縮を伴う膵管径の急激な変化などは相対適応（worrisome features）で、EUSや膵液細胞診を参考に適応を決める。"}, {"id": 111, "group": "胆・膵", "cat": "膵癌", "type": "single", "ref": "膵癌 切除可能性分類(取扱い規約第7版)", "case": "68歳男性。膵頭部癌。造影CTで腫瘍と上腸間膜動脈（SMA）の接触が180度未満で、SMAの狭窄・変形は認めない。腹腔動脈・総肝動脈への接触はなく、遠隔転移も認めない。", "q": "切除可能性分類として正しいのはどれか。", "choices": [["a", "Resectable（R）"], ["b", "Borderline resectable artery（BR-A）"], ["c", "Borderline resectable portal vein（BR-PV）"], ["d", "Unresectable locally advanced（UR-LA）"], ["e", "Unresectable metastasis（UR-M）"]], "answer": ["b"], "expl": "SMAまたは腹腔動脈に180度未満の接触・浸潤があるが狭窄・変形を認めないものはBR-A。SMV/PVへの180度以上の接触・浸潤あるいは閉塞（範囲が十二指腸下縁を越えない）はBR-PV、動脈の狭窄・変形を伴う高度浸潤はUR-LAとなる。"}, {"id": 112, "group": "胆・膵", "cat": "胆道良性・徴候", "type": "single", "ref": "胆石症・閉塞性黄疸の徴候", "case": "", "q": "徴候・症候群とその病態の組合せで正しいのはどれか。", "choices": [["a", "Mirizzi症候群 ── 傍乳頭憩室による胆汁うっ滞"], ["b", "Lemmel症候群 ── 傍乳頭憩室による閉塞性黄疸"], ["c", "Courvoisier徴候 ── 有痛性の胆嚢腫大"], ["d", "Murphy徴候 ── 呼気で痛みのため呼吸が止まる"], ["e", "Charcot3徴 ── 発熱・黄疸・ショック"]], "answer": ["b"], "expl": "Lemmel症候群は傍乳頭憩室による胆汁うっ滞に起因する閉塞性黄疸。Mirizzi症候群は胆嚢頸部結石による総肝管の圧排・狭窄。Courvoisier徴候は無痛性の腫大胆嚢触知（乳頭部癌・膵癌など）。Murphy徴候は圧迫下の深呼吸（吸気）で痛みのため吸気が止まる現象。Charcot3徴は発熱・黄疸・腹痛。"}, {"id": 113, "group": "胆・膵", "cat": "急性膵炎", "type": "multiple", "ref": "急性膵炎 診断・治療", "case": "", "q": "急性膵炎について正しいものはどれか。2つ選べ。", "choices": [["a", "診断は診断基準3項目のすべてを満たす必要がある。"], ["b", "感染性膵壊死は致命率が高い。"], ["c", "男性では胆石が最も多い原因である。"], ["d", "感染を合併した壊死組織に対してはnecrosectomyが標準術式として確立しつつある。"], ["e", "血清アミラーゼ・リパーゼは低下する。"]], "answer": ["b", "d"], "expl": "急性膵炎の診断は、上腹部急性腹痛と圧痛・血中/尿中膵酵素上昇・画像での膵の異常所見の3項目中2項目以上で行う。原因は男性でアルコール性が最多、女性で胆石性が最多。感染性膵壊死の致命率は約30%と高く、感染を伴う壊死には壊死部切除（necrosectomy）が標準術式として確立しつつある。"}, {"id": 114, "group": "胆・膵", "cat": "肝門部領域胆管癌", "type": "single", "ref": "肝門部領域胆管癌の術式", "case": "65歳男性。閉塞性黄疸で発見された右側優位の肝門部領域胆管癌。定型術式として拡大右肝切除＋肝外胆管切除が予定されたが、術前肝容積測定で予定残肝容積が33%と不足していた。", "q": "治療方針として適切なのはどれか。", "choices": [["a", "化学療法のみで根治が可能である。"], ["b", "内視鏡的乳頭切除を第一選択とする。"], ["c", "予定残肝容積が不足するため術前に門脈右枝塞栓術を行う。"], ["d", "尾状葉は温存する。"], ["e", "広範囲肝切除でも術前減黄は不要である。"]], "answer": ["c"], "expl": "肝門部領域胆管癌の根治的治療は手術のみ。右側優位病変の定型術式は尾状葉を含む拡大右肝切除＋肝外胆管切除＋リンパ節郭清。ICG正常で必要残肝容積は約40%であり、不足する場合は術前門脈右枝塞栓術で予定残肝を肥大させる。広範囲肝切除を予定する場合、黄疸肝への肝切除は成績不良のため術前減黄が必須とされる。"}];
const GROUPS = [...new Set(QUESTIONS.map(q=>q.group))];

const LS_KEY = "kokushi_shokaki_stats_v1";
let quiz = [], idx = 0, selected = [], answered = false, session = [];
let numChoice = 10, orderChoice = "順番", groupChoice = "すべて";

const main = document.getElementById('main');
const footer = document.getElementById('footer');
const hCount = document.getElementById('hCount');
const hTitle = document.getElementById('hTitle');
const prog = document.getElementById('prog');

function loadStats(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }
function saveStat(id, correct){
  try{
    const s = loadStats();
    if(!s[id]) s[id] = {seen:0, ok:0};
    s[id].seen++; if(correct) s[id].ok++;
    localStorage.setItem(LS_KEY, JSON.stringify(s));
  }catch(e){}
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function renderStart(){
  hCount.textContent = ""; prog.style.width = "0%"; hTitle.textContent = "カテゴリーⅠ 消化器";
  const stats = loadStats();
  const totalSeen = Object.values(stats).reduce((x,v)=>x+v.seen,0);
  const totalOk = Object.values(stats).reduce((x,v)=>x+v.ok,0);
  const rate = totalSeen? Math.round(totalOk/totalSeen*100):0;
  const nums = [10,20,30];
  main.innerHTML = `
    <div class="hero">
      <h1>消化器 予想問題</h1>
      <p>カテゴリーⅠ形式・消化器　全${QUESTIONS.length}問</p>
    </div>
    <div class="stat">
      <div class="c"><div class="n">${QUESTIONS.length}</div><div class="l">収録問題</div></div>
      <div class="c"><div class="n">${totalSeen}</div><div class="l">のべ解答数</div></div>
      <div class="c"><div class="n">${rate}%</div><div class="l">累計正答率</div></div>
    </div>
    <div class="panel">
      <h2>分野</h2>
      <div class="seg" id="segGroup">
        <button data-g="すべて" class="${groupChoice==='すべて'?'on':''}">すべて（${QUESTIONS.length}）</button>
        ${GROUPS.map(g=>`<button data-g="${g}" class="${groupChoice===g?'on':''}">${g}（${QUESTIONS.filter(q=>q.group===g).length}）</button>`).join('')}
      </div>
    </div>
    <div class="panel">
      <h2>出題数</h2>
      <div class="seg" id="segNum">
        ${nums.map(n=>`<button data-n="${n}" class="${n===numChoice?'on':''}">${n}問</button>`).join('')}
        <button data-n="all" class="${numChoice==='all'?'on':''}">全部</button>
      </div>
    </div>
    <div class="panel">
      <h2>出題順</h2>
      <div class="seg" id="segOrder">
        <button data-o="順番" class="${orderChoice==='順番'?'on':''}">順番どおり</button>
        <button data-o="ランダム" class="${orderChoice==='ランダム'?'on':''}">ランダム</button>
      </div>
    </div>`;
  footer.innerHTML = `<button class="btn" id="startBtn">演習をはじめる</button>`;
  document.getElementById('segGroup').onclick = e=>{
    const b=e.target.closest('button'); if(!b)return;
    groupChoice = b.dataset.g;
    [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  };
  document.getElementById('segNum').onclick = e=>{
    const b=e.target.closest('button'); if(!b)return;
    numChoice = b.dataset.n==='all'?'all':parseInt(b.dataset.n);
    [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  };
  document.getElementById('segOrder').onclick = e=>{
    const b=e.target.closest('button'); if(!b)return;
    orderChoice = b.dataset.o;
    [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  };
  document.getElementById('startBtn').onclick = startQuiz;
}

function startQuiz(){
  let base = groupChoice==='すべて'? QUESTIONS : QUESTIONS.filter(q=>q.group===groupChoice);
  let pool = orderChoice==='ランダム'? shuffle(base) : base.slice();
  const n = numChoice==='all'? pool.length : Math.min(numChoice, pool.length);
  quiz = pool.slice(0, n); idx = 0; session = [];
  renderQuestion();
}

function renderQuestion(){
  const item = quiz[idx];
  selected = []; answered = false;
  hTitle.textContent = "カテゴリーⅠ 消化器";
  hCount.textContent = `${idx+1} / ${quiz.length}`;
  prog.style.width = ((idx)/quiz.length*100)+"%";
  const multi = item.type==='multiple';
  main.innerHTML = `
    <div class="tags">
      <span class="tag">${item.cat}</span>
      <span class="tag k">${item.ref||''}</span>
      <span class="tag k">${multi?'複数選択':'単一選択'}</span>
    </div>
    ${item.case? `<div class="case">${item.case}</div>`:''}
    <p class="q">${item.q}</p>
    <p class="hint">${multi?'あてはまるものをすべて選び、解答するを押す':'1つ選ぶと解答できる'}</p>
    <div id="opts">
      ${item.choices.map(([k,t])=>`
        <div class="opt" data-k="${k}"><span class="k">${k}</span><span>${t}</span></div>`).join('')}
    </div>`;
  footer.innerHTML = `<button class="btn" id="ansBtn" disabled>解答する</button>`;
  document.getElementById('opts').onclick = e=>{
    if(answered) return;
    const o = e.target.closest('.opt'); if(!o) return;
    const k = o.dataset.k;
    if(multi){
      if(selected.includes(k)){ selected=selected.filter(x=>x!==k); o.classList.remove('sel'); }
      else { selected.push(k); o.classList.add('sel'); }
    } else {
      selected=[k];
      [...e.currentTarget.children].forEach(x=>x.classList.toggle('sel',x===o));
    }
    document.getElementById('ansBtn').disabled = selected.length===0;
  };
  document.getElementById('ansBtn').onclick = checkAnswer;
}

function eqSet(a,b){ return a.length===b.length && a.every(x=>b.includes(x)); }

function checkAnswer(){
  const item = quiz[idx];
  answered = true;
  const correct = eqSet(selected, item.answer);
  session.push({id:item.id, correct});
  saveStat(item.id, correct);
  prog.style.width = ((idx+1)/quiz.length*100)+"%";
  document.querySelectorAll('#opts .opt').forEach(o=>{
    const k=o.dataset.k;
    o.classList.remove('sel'); o.style.cursor='default';
    const isAns = item.answer.includes(k);
    const isSel = selected.includes(k);
    if(isAns){
      o.classList.add('correct');
      o.insertAdjacentHTML('beforeend', `<span class="badge b-ok">正解${isSel?'／選択':''}</span>`);
    } else if(isSel){
      o.classList.add('wrong');
      o.insertAdjacentHTML('beforeend', `<span class="badge b-miss">あなたの解答</span>`);
    } else { o.classList.add('plain'); }
  });
  const head = `
    <div class="result-head ${correct?'hit':'miss'}">
      <span class="mark" style="background:${correct?'var(--ok)':'var(--accent)'}">${correct?'◎':'×'}</span>
      ${correct?'正解':'不正解'}
    </div>`;
  const expl = `<div class="expl"><div class="lab">解説</div><div>${item.expl}</div></div>`;
  main.insertAdjacentHTML('beforeend', head+expl);
  main.querySelector('.expl').scrollIntoView({behavior:'smooth', block:'nearest'});
  const last = idx===quiz.length-1;
  footer.innerHTML = `<button class="btn" id="nextBtn">${last?'結果を見る':'次の問題 →'}</button>`;
  document.getElementById('nextBtn').onclick = ()=>{
    if(last){ renderResult(); } else { idx++; renderQuestion(); main.scrollTop=0; }
  };
}

function renderResult(){
  const ok = session.filter(s=>s.correct).length;
  const total = session.length;
  const rate = Math.round(ok/total*100);
  hCount.textContent = ""; prog.style.width = "100%"; hTitle.textContent = "結果";
  const wrong = session.filter(s=>!s.correct);
  main.innerHTML = `
    <div class="score">
      <div class="big">${ok} / ${total}</div>
      <div class="lab">正答率 ${rate}%</div>
    </div>
    ${wrong.length? `<div class="panel"><h2>復習（間違えた問題 ${wrong.length}）</h2></div>` : `<div class="panel"><h2>全問正解。おつかれさま</h2></div>`}
    <div id="reviewList">
      ${wrong.map(w=>{
        const it = QUESTIONS.find(q=>q.id===w.id);
        return `<div class="review-item">
          <div class="h"><span class="dot" style="background:var(--accent)">×</span><span>${it.cat}・${it.ref||''}</span></div>
          <div style="font-size:14px;margin-bottom:6px">${it.q}</div>
          <div style="font-size:12px;color:var(--sub)">正解：${it.answer.join('・')}　${it.choices.filter(c=>it.answer.includes(c[0])).map(c=>c[1]).join(' / ')}</div>
          <div style="font-size:12px;margin-top:6px">${it.expl}</div>
        </div>`;
      }).join('')}
    </div>`;
  footer.innerHTML = `
    <div class="row">
      <button class="btn ghost" id="homeBtn" style="flex:1">最初の画面へ</button>
      <button class="btn" id="againBtn" style="flex:1">もう一度</button>
    </div>`;
  document.getElementById('homeBtn').onclick = renderStart;
  document.getElementById('againBtn').onclick = ()=>{ startQuiz(); main.scrollTop=0; };
}

renderStart();
</script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
